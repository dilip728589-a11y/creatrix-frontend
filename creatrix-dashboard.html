<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creatrix AI — Creator Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=Cabinet+Grotesk:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<style>
:root {
  --bg: #04040A;
  --bg2: #080812;
  --bg3: #0C0C1A;
  --card: #0F0F1E;
  --card2: #161628;
  --card3: #1C1C32;
  --white: #F0EEF8;
  --muted: #7070A0;
  --muted2: #3A3A5C;
  --accent: #FF3CAC;
  --accent2: #784CFE;
  --accent3: #00F5D4;
  --gold: #FFD166;
  --border: rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.11);
  --font-h: 'Clash Display', sans-serif;
  --font-b: 'Cabinet Grotesk', sans-serif;
  --sidebar-w: 240px;
  --topbar-h: 64px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body { background: var(--bg); color: var(--white); font-family: var(--font-b); display: flex; }

/* ── SIDEBAR ── */
.sidebar {
  width: var(--sidebar-w);
  height: 100vh;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}
.sidebar-logo {
  padding: 0 1.5rem;
  height: var(--topbar-h);
  display: flex;
  align-items: center;
  border-bottom: 1px solid var(--border);
  font-family: var(--font-h);
  font-size: 1.3rem;
  font-weight: 700;
  letter-spacing: -0.02em;
  text-decoration: none;
  color: var(--white);
  flex-shrink: 0;
}
.sidebar-logo span { background: linear-gradient(90deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

.sidebar-nav { flex: 1; padding: 1.25rem 0.75rem; overflow-y: auto; }
.nav-section-label { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted2); padding: 0 0.75rem; margin: 1.25rem 0 0.5rem; }
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 0.65rem 0.75rem;
  border-radius: 10px;
  color: var(--muted);
  font-size: 0.88rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.18s;
  text-decoration: none;
  margin-bottom: 2px;
  position: relative;
}
.nav-item:hover { color: var(--white); background: rgba(255,255,255,0.04); }
.nav-item.active { color: var(--white); background: rgba(120,76,254,0.15); }
.nav-item.active::before { content: ''; position: absolute; left: 0; top: 20%; bottom: 20%; width: 3px; border-radius: 0 3px 3px 0; background: linear-gradient(180deg, var(--accent), var(--accent2)); }
.nav-icon { width: 20px; height: 20px; text-align: center; font-size: 0.78rem; flex-shrink: 0; display: flex; align-items: center; justify-content: center; overflow: hidden; line-height: 1; }
.nav-badge { margin-left: auto; background: var(--accent); color: #fff; font-size: 0.62rem; font-weight: 800; padding: 1px 7px; border-radius: 100px; }
.nav-badge.green { background: var(--accent3); color: var(--bg); }

.sidebar-bottom {
  padding: 1rem 0.75rem;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.credits-box {
  background: linear-gradient(135deg, rgba(120,76,254,0.15), rgba(255,60,172,0.1));
  border: 1px solid rgba(120,76,254,0.25);
  border-radius: 14px;
  padding: 1rem;
  margin-bottom: 0.75rem;
}
.credits-label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 700; margin-bottom: 4px; }
.credits-val { font-family: var(--font-h); font-size: 1.6rem; font-weight: 700; line-height: 1; }
.credits-val span { font-size: 0.75rem; color: var(--muted); font-family: var(--font-b); font-weight: 400; }
.credits-bar-bg { height: 4px; background: var(--border2); border-radius: 2px; margin: 8px 0 6px; }
.credits-bar-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--accent2), var(--accent)); width: 38%; }
.credits-note { font-size: 0.72rem; color: var(--muted); }
.buy-btn {
  width: 100%; padding: 0.6rem; border: none; border-radius: 10px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #fff; font-family: var(--font-h); font-weight: 700; font-size: 0.85rem;
  cursor: pointer; transition: opacity 0.2s; margin-bottom: 0.75rem;
}
.buy-btn:hover { opacity: 0.88; }
.user-row { display: flex; align-items: center; gap: 10px; padding: 0.5rem 0.25rem; cursor: pointer; border-radius: 10px; transition: background 0.2s; }
.user-row:hover { background: rgba(255,255,255,0.04); }
.user-av { width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(135deg, var(--accent2), var(--accent)); display: flex; align-items: center; justify-content: center; font-size: 0.85rem; font-weight: 700; flex-shrink: 0; }
.user-name { font-size: 0.85rem; font-weight: 600; }
.user-plan { font-size: 0.72rem; color: var(--muted); }
.user-more { margin-left: auto; color: var(--muted); font-size: 0.8rem; }

/* ── MAIN ── */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* TOPBAR */
.topbar {
  height: var(--topbar-h);
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 2rem;
  gap: 1rem;
  flex-shrink: 0;
}
.topbar-title { font-family: var(--font-h); font-size: 1.1rem; font-weight: 700; flex: 1; }
.topbar-search {
  display: flex; align-items: center; gap: 8px;
  background: var(--card); border: 1px solid var(--border2); border-radius: 10px;
  padding: 0.45rem 0.9rem; color: var(--muted); font-size: 0.85rem;
  cursor: pointer; transition: border-color 0.2s;
}
.topbar-search:hover { border-color: rgba(255,255,255,0.2); }
.topbar-btns { display: flex; gap: 0.5rem; }
.tb-btn { width: 36px; height: 36px; border-radius: 9px; background: var(--card); border: 1px solid var(--border2); display: flex; align-items: center; justify-content: center; font-size: 1rem; cursor: pointer; transition: border-color 0.2s; position: relative; }
.tb-btn:hover { border-color: rgba(255,255,255,0.2); }
.tb-notif::after { content: ''; position: absolute; top: 7px; right: 7px; width: 7px; height: 7px; background: var(--accent); border-radius: 50%; border: 1.5px solid var(--bg2); }
.tb-new-btn {
  display: flex; align-items: center; gap: 7px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #fff; border: none; border-radius: 10px; padding: 0.5rem 1.1rem;
  font-family: var(--font-h); font-size: 0.85rem; font-weight: 700; cursor: pointer;
  transition: opacity 0.2s;
}
.tb-new-btn:hover { opacity: 0.88; }

/* CONTENT AREA */
.content { flex: 1; overflow-y: auto; padding: 2rem; background: var(--bg); }

/* PAGE SWITCHING */
.page { display: none; }
.page.active { display: block; animation: fadeIn 0.3s ease both; }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

/* ── OVERVIEW PAGE ── */
.welcome-banner {
  background: linear-gradient(120deg, rgba(120,76,254,0.2) 0%, rgba(255,60,172,0.12) 60%, transparent 100%);
  border: 1px solid rgba(120,76,254,0.2);
  border-radius: 20px;
  padding: 1.75rem 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1.75rem;
  position: relative;
  overflow: hidden;
}
.welcome-banner::before { content: ''; position: absolute; right: -60px; top: -60px; width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle, rgba(120,76,254,0.25), transparent 70%); }
.wb-title { font-family: var(--font-h); font-size: 1.3rem; font-weight: 700; margin-bottom: 0.3rem; }
.wb-sub { color: var(--muted); font-size: 0.88rem; }
.wb-emoji { font-size: 3rem; position: relative; z-index: 1; }

/* Stats grid */
.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1.75rem; }
.stat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 1.25rem 1.5rem;
  transition: border-color 0.2s, transform 0.2s;
}
.stat-card:hover { border-color: var(--border2); transform: translateY(-2px); }
.stat-label { font-size: 0.75rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 6px; }
.stat-num { font-family: var(--font-h); font-size: 1.9rem; font-weight: 700; letter-spacing: -0.03em; line-height: 1; }
.stat-change { font-size: 0.75rem; margin-top: 0.4rem; display: flex; align-items: center; gap: 4px; }
.stat-up { color: var(--accent3); }
.stat-down { color: var(--accent); }

/* Two col layout */
.two-col { display: grid; grid-template-columns: 1.4fr 1fr; gap: 1.25rem; margin-bottom: 1.75rem; }

/* Recent creations */
.section-card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; overflow: hidden; }
.sc-header { display: flex; align-items: center; justify-content: space-between; padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border); }
.sc-title { font-family: var(--font-h); font-size: 0.95rem; font-weight: 700; }
.sc-action { font-size: 0.78rem; color: var(--accent2); cursor: pointer; text-decoration: none; }

.creation-list { padding: 0.5rem; }
.creation-item {
  display: flex; align-items: center; gap: 12px;
  padding: 0.75rem 1rem;
  border-radius: 12px;
  transition: background 0.18s;
  cursor: pointer;
}
.creation-item:hover { background: var(--card2); }
.creation-thumb {
  width: 44px; height: 44px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.4rem; flex-shrink: 0;
}
.creation-info { flex: 1; min-width: 0; }
.creation-name { font-size: 0.88rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.creation-meta { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
.creation-status { font-size: 0.72rem; font-weight: 700; padding: 3px 10px; border-radius: 100px; flex-shrink: 0; }
.status-done { background: rgba(0,245,212,0.12); color: var(--accent3); }
.status-proc { background: rgba(120,76,254,0.12); color: var(--accent2); }
.status-draft { background: rgba(255,255,255,0.06); color: var(--muted); }

/* Quick tools */
.quick-tools { padding: 1rem; display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
.qt-card {
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 1rem;
  cursor: pointer;
  transition: border-color 0.2s, transform 0.15s;
  text-align: center;
}
.qt-card:hover { border-color: rgba(120,76,254,0.4); transform: translateY(-2px); }
.qt-icon { font-size: 1.75rem; margin-bottom: 0.4rem; }
.qt-name { font-size: 0.8rem; font-weight: 600; }
.qt-credits { font-size: 0.7rem; color: var(--muted); margin-top: 2px; }

/* Activity feed */
.activity-list { padding: 0.75rem 1.5rem; }
.activity-item { display: flex; align-items: flex-start; gap: 12px; padding: 0.7rem 0; border-bottom: 1px solid var(--border); }
.activity-item:last-child { border-bottom: none; }
.activity-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
.activity-text { font-size: 0.84rem; line-height: 1.5; flex: 1; }
.activity-text span { color: var(--white); font-weight: 600; }
.activity-time { font-size: 0.72rem; color: var(--muted); flex-shrink: 0; margin-top: 2px; }

/* Chart placeholder */
.chart-area { padding: 1.25rem 1.5rem; }
.chart-title { font-size: 0.8rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 1rem; }
.bar-chart { display: flex; align-items: flex-end; gap: 8px; height: 80px; }
.bar { flex: 1; border-radius: 5px 5px 0 0; transition: height 0.5s ease; }
.bar-labels { display: flex; gap: 8px; margin-top: 6px; }
.bar-lbl { flex: 1; text-align: center; font-size: 0.65rem; color: var(--muted); }

/* ── TOOLS PAGE ── */
.tools-page-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1.25rem; }
.tool-big-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  overflow: hidden;
  cursor: pointer;
  transition: border-color 0.2s, transform 0.2s;
}
.tool-big-card:hover { border-color: rgba(120,76,254,0.4); transform: translateY(-3px); }
.tool-card-banner {
  height: 120px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 3.5rem;
  position: relative;
  overflow: hidden;
}
.tb1 { background: linear-gradient(135deg, rgba(255,60,172,0.2), rgba(120,76,254,0.2)); }
.tb2 { background: linear-gradient(135deg, rgba(120,76,254,0.2), rgba(0,245,212,0.1)); }
.tb3 { background: linear-gradient(135deg, rgba(0,245,212,0.15), rgba(120,76,254,0.1)); }
.tb4 { background: linear-gradient(135deg, rgba(255,209,102,0.15), rgba(255,60,172,0.1)); }
.tb5 { background: linear-gradient(135deg, rgba(59,130,246,0.2), rgba(120,76,254,0.1)); }
.tb6 { background: linear-gradient(135deg, rgba(52,211,153,0.15), rgba(0,245,212,0.1)); }
.tb7 { background: linear-gradient(135deg, rgba(251,146,60,0.15), rgba(255,209,102,0.1)); }
.tb8 { background: linear-gradient(135deg, rgba(248,113,113,0.15), rgba(255,60,172,0.1)); }
.tool-card-body { padding: 1.25rem; }
.tool-card-name { font-family: var(--font-h); font-size: 1rem; font-weight: 700; margin-bottom: 0.35rem; }
.tool-card-desc { font-size: 0.82rem; color: var(--muted); line-height: 1.6; margin-bottom: 1rem; }
.tool-card-footer { display: flex; align-items: center; justify-content: space-between; }
.tool-cost { font-size: 0.75rem; color: var(--muted); }
.tool-cost strong { color: var(--accent3); }
.tool-use-btn { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; border: none; border-radius: 8px; padding: 0.45rem 1rem; font-family: var(--font-h); font-size: 0.8rem; font-weight: 700; cursor: pointer; transition: opacity 0.2s; }
.tool-use-btn:hover { opacity: 0.85; }
.tool-new-badge { position: absolute; top: 10px; right: 10px; background: var(--accent3); color: var(--bg); font-size: 0.62rem; font-weight: 800; padding: 2px 8px; border-radius: 100px; letter-spacing: 0.06em; }

/* ── MY INFLUENCERS PAGE ── */
.influencer-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1.25rem; }
.influencer-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  overflow: hidden;
  cursor: pointer;
  transition: border-color 0.2s, transform 0.2s;
}
.influencer-card:hover { border-color: rgba(255,60,172,0.4); transform: translateY(-3px); }
.inf-banner { height: 140px; display: flex; align-items: center; justify-content: center; font-size: 3.2rem; position: relative; overflow: hidden; }
.inf-status-dot { position: absolute; top: 10px; right: 10px; width: 11px; height: 11px; border-radius: 50%; border: 2px solid rgba(0,0,0,0.5); z-index: 2; }
.dot-active { background: var(--accent3); }
.dot-draft { background: var(--muted2); }
.inf-body { padding: 1rem; }
.inf-name { font-family: var(--font-h); font-size: 0.95rem; font-weight: 700; margin-bottom: 2px; }
.inf-niche { font-size: 0.75rem; color: var(--muted); margin-bottom: 0.75rem; }
.inf-stats { display: flex; gap: 1rem; }
.inf-stat-val { font-family: var(--font-h); font-size: 0.9rem; font-weight: 700; }
.inf-stat-label { font-size: 0.65rem; color: var(--muted); }
.inf-actions { display: flex; gap: 6px; padding: 0.75rem 1rem; border-top: 1px solid var(--border); }
.inf-btn { flex: 1; padding: 0.45rem; border-radius: 8px; border: 1px solid var(--border2); background: none; color: var(--muted); font-size: 0.75rem; font-weight: 600; cursor: pointer; font-family: var(--font-b); transition: all 0.18s; }
.inf-btn:hover { background: var(--card2); color: var(--white); }
.inf-btn.primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); border-color: transparent; color: #fff; }
.create-new-card {
  background: var(--card);
  border: 2px dashed var(--muted2);
  border-radius: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 280px;
  cursor: pointer;
  transition: border-color 0.2s;
  gap: 0.75rem;
}
.create-new-card:hover { border-color: var(--accent2); }
.create-new-icon { font-size: 2.5rem; }
.create-new-text { font-family: var(--font-h); font-size: 0.9rem; font-weight: 600; color: var(--muted); }

/* ── CREDITS PAGE ── */
.credits-page-wrap { max-width: 860px; }
.credits-hero-card {
  background: linear-gradient(120deg, rgba(120,76,254,0.2) 0%, rgba(255,60,172,0.12) 60%, transparent 100%);
  border: 1px solid rgba(120,76,254,0.25);
  border-radius: 22px;
  padding: 2rem 2.5rem;
  margin-bottom: 1.75rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 2rem;
}
.credits-big { font-family: var(--font-h); font-size: 4rem; font-weight: 700; line-height: 1; }
.credits-big span { font-size: 1.1rem; color: var(--muted); font-family: var(--font-b); font-weight: 400; }
.credits-info-label { font-size: 0.8rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.5rem; }
.credits-breakdown { display: flex; gap: 2rem; margin-top: 1rem; }
.cb-item { font-size: 0.85rem; color: var(--muted); }
.cb-item strong { color: var(--white); font-family: var(--font-h); font-size: 1.1rem; display: block; }

.pack-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.25rem; margin-bottom: 1.75rem; }
.pack-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 1.75rem 1.5rem;
  position: relative;
  transition: transform 0.2s;
}
.pack-card:hover { transform: translateY(-3px); }
.pack-card.featured { border-color: rgba(255,60,172,0.4); background: linear-gradient(160deg, rgba(255,60,172,0.07), var(--card) 60%); }
.pack-ribbon { position: absolute; top: -1px; left: 50%; transform: translateX(-50%); background: linear-gradient(90deg, var(--accent), var(--accent2)); color: #fff; font-size: 0.65rem; font-weight: 800; padding: 4px 16px; border-radius: 0 0 10px 10px; white-space: nowrap; letter-spacing: 0.06em; text-transform: uppercase; }
.pack-credits { font-family: var(--font-h); font-size: 2.2rem; font-weight: 700; color: var(--accent3); margin-bottom: 0.25rem; }
.pack-credits span { font-size: 0.85rem; color: var(--muted); font-family: var(--font-b); font-weight: 400; }
.pack-price { font-family: var(--font-h); font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
.pack-per { font-size: 0.75rem; color: var(--muted); margin-bottom: 1.25rem; }
.pack-features { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1.5rem; }
.pack-features li { font-size: 0.82rem; color: var(--muted); display: flex; gap: 8px; }
.pack-features li::before { content: '✓'; color: var(--accent3); font-weight: 800; flex-shrink: 0; }
.pack-buy-btn { width: 100%; padding: 0.75rem; border-radius: 10px; border: none; font-family: var(--font-h); font-weight: 700; font-size: 0.9rem; cursor: pointer; transition: all 0.2s; }
.pack-buy-btn.grad { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; }
.pack-buy-btn.grad:hover { opacity: 0.88; }
.pack-buy-btn.outline { background: transparent; border: 1px solid var(--border2); color: var(--white); }
.pack-buy-btn.outline:hover { border-color: rgba(255,255,255,0.25); background: rgba(255,255,255,0.04); }

.usage-table { background: var(--card); border: 1px solid var(--border); border-radius: 18px; overflow: hidden; }
.table-head { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 1rem; padding: 0.75rem 1.5rem; background: var(--card2); border-bottom: 1px solid var(--border); font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }
.table-row { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 1rem; padding: 0.9rem 1.5rem; border-bottom: 1px solid var(--border); font-size: 0.85rem; transition: background 0.18s; }
.table-row:last-child { border-bottom: none; }
.table-row:hover { background: var(--card2); }
.tr-icon { font-size: 0.9rem; margin-right: 6px; }
.tr-credit { font-family: var(--font-h); font-weight: 700; color: var(--accent); }
.tr-date { color: var(--muted); }
.tr-status { font-size: 0.72rem; font-weight: 700; padding: 2px 9px; border-radius: 100px; display: inline-block; }

              <div class="cb-item"><strong>62</strong> used this month</div>
              <div class="cb-item"><strong>100</strong> last purchased</div>
            </div>
          </div>
          <button class="buy-btn" style="width:auto;padding:0.75rem 2rem;font-size:1rem;">+ Buy More Credits</button>

        <div class="pack-grid">

            <button class="pack-buy-btn outline" disabled style="opacity:0.4;cursor:not-allowed;">Current Plan</button>
          </div>
          <div class="pack-card featured">
            <div class="pack-ribbon">Most Popular</div>
            <div class="pack-credits">100 <span>credits</span></div>
            <div class="pack-price">₹299</div>
            <p class="pack-per">~₹3 per credit</p>
            <ul class="pack-features">
              <li>1080p HD exports</li>
              <li>No watermark</li>
              <li>All 10+ AI models</li>

            </ul>
            <button class="pack-buy-btn grad">Buy Now</button>
          </div>
          <div class="pack-card">
            <div class="pack-credits">300 <span>credits</span></div>
            <div class="pack-price">₹799</div>
            <p class="pack-per">~₹2.6 per credit · Save 15%</p>
            <ul class="pack-features">
              <li>4K ultra exports</li>
              <li>API access</li>
              <li>Multiple influencers</li>
              <li>Dedicated support</li>
            </ul>
            <button class="pack-buy-btn outline">Buy Now</button>
          </div>
        </div>

        <div class="usage-table">
          <div class="sc-header" style="padding:1.25rem 1.5rem;">
            <div class="sc-title">Credit Usage History</div>
          </div>
          <div class="table-head">
            <div>Action</div><div>Credits</div><div>Date</div><div>Status</div>
          </div>
          <div class="table-row"><div><span class="tr-icon">🎬</span>AI Video Generation · Kling v3</div><div class="tr-credit">-5</div><div class="tr-date">Today, 2:14 PM</div><div><span class="tr-status ts-done">Done</span></div></div>
          <div class="table-row"><div><span class="tr-icon">👄</span>Lip Sync · TechGuru</div><div class="tr-credit">-4</div><div class="tr-date">Today, 9:30 AM</div><div><span class="tr-status ts-done">Done</span></div></div>
          <div class="table-row"><div><span class="tr-icon">😶</span>Face Swap · FitBot</div><div class="tr-credit">-3</div><div class="tr-date">Yesterday</div><div><span class="tr-status ts-done">Done</span></div></div>
          <div class="table-row"><div><span class="tr-icon">📸</span>Headshot Generator · Luna</div><div class="tr-credit">-2</div><div class="tr-date">Yesterday</div><div><span class="tr-status ts-done">Done</span></div></div>
          <div class="table-row"><div><span class="tr-icon">💎</span>Purchased 100 Credits — Creator Pack</div><div class="tr-credit" style="color:var(--accent3)">+100</div><div class="tr-date">3 days ago</div><div><span class="tr-status ts-done">Paid</span></div></div>
          <div class="table-row"><div><span class="tr-icon">🕹️</span>Motion Control · Aria</div><div class="tr-credit">-5</div><div class="tr-date">4 days ago</div><div><span class="tr-status ts-done">Done</span></div></div>
        </div>
      </div>
    </div>

  </div>
</div>

<script src="api.js"></script>
<script>
// ══════════════════════════════════════
// DASHBOARD — Uses api.js (CreatrixAPI)
// ══════════════════════════════════════

// Auth guard — redirect if not logged in
if (!CreatrixAPI.Auth.isLoggedIn()) {
  window.location.href = 'creatrix-auth.html';
}

// ── PAGE NAVIGATION ──
const pageTitles = {
  overview: 'Overview', tools: 'AI Tools',
  influencers: 'My Influencers', creations: 'My Creations', credits: 'Credits & Billing'
};

function showPage(name, navEl) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.getElementById('topbarTitle').textContent = pageTitles[name] || name;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  if (navEl) navEl.classList.add('active');
  if (name === 'credits') loadTransactionHistory();
}

const toolPages = {
  video: 'creatrix-video-generator.html', lipsync: 'creatrix-lipsync.html',
  motion: 'creatrix-motion-control.html', ugc: 'creatrix-ugc-creator.html',
  influencer: 'creatrix-create-influencer.html',
};
function goTool(key) { if (toolPages[key]) window.location = toolPages[key]; }

// ── RENDER USER DATA ──
function renderUserData(user) {
  const totalCredits = (user.free_credits || 0) + (user.paid_credits || 0);
  const firstName = (user.name || 'Creator').split(' ')[0];
  const hour = new Date().getHours();
  const greeting = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';
  const initial = firstName[0].toUpperCase();
  const planLabel = user.plan_name ? user.plan_name.replace(/_/g,' ') : 'Starter';

  // Sidebar
  document.querySelector('.user-name').textContent = user.name || 'Creator';
  document.querySelector('.user-plan').textContent = planLabel;
  document.querySelector('.user-av').textContent = initial;

  // Credits sidebar box
  document.querySelector('.credits-val').innerHTML = `${totalCredits} <span>credits</span>`;
  document.querySelector('.credits-note').textContent = `${user.paid_credits || 0} paid · ${user.free_credits || 0} free`;
  const fillPct = Math.min(100, (totalCredits / Math.max(totalCredits, 100)) * 100);
  document.querySelector('.credits-bar-fill').style.width = fillPct + '%';

  // Welcome banner
  document.querySelector('.wb-title').textContent = `${greeting}, ${firstName}! 👋`;
  document.querySelector('.wb-sub').textContent = totalCredits > 0
    ? `You have ${totalCredits} credits. Create something amazing today!`
    : `You're out of credits. Buy more to keep creating! 🚀`;

  // Stats
  const statNums = document.querySelectorAll('.stat-num');
  if (statNums[2]) statNums[2].textContent = totalCredits;

  // Credits page balance
  const creditsBig = document.querySelector('.credits-big');
  if (creditsBig) creditsBig.innerHTML = `${totalCredits} <span>credits</span>`;
}

// ── LOAD USER FROM BACKEND ──
async function loadUserData() {
  // Show cached user instantly (no flash)
  const cached = CreatrixAPI.Auth.getUser();
  if (cached) renderUserData(cached);

  // Then fetch fresh data from backend
  try {
    const data = await CreatrixAPI.Auth.me();
    if (data && data.user) {
      // Save updated user to localStorage
      localStorage.setItem('creatrix_user', JSON.stringify(data.user));
      renderUserData(data.user);
    }
  } catch (err) {
    console.error('loadUserData:', err);
  }
}

// ── LOAD TRANSACTION HISTORY ──
async function loadTransactionHistory() {
  try {
    const data = await CreatrixAPI.Payment.getHistory();
    if (!data || !data.transactions || data.transactions.length === 0) return;

    const table = document.querySelector('.usage-table');
    if (!table) return;

    // Remove old static rows
    table.querySelectorAll('.table-row').forEach(r => r.remove());

    data.transactions.forEach(tx => {
      const dateStr = new Date(tx.created_at).toLocaleDateString('en-IN', { day: 'numeric', month: 'short' });
      const row = document.createElement('div');
      row.className = 'table-row';
      row.innerHTML = `
        <div><span class="tr-icon">💎</span>${tx.plan_name}</div>
        <div class="tr-credit" style="color:var(--accent3)">+${tx.credits}</div>
        <div class="tr-date">${dateStr}</div>
        <div><span class="tr-status ts-done">${tx.status}</span></div>`;
      table.appendChild(row);
    });
  } catch (err) {
    console.error('loadTransactionHistory:', err);
  }
}

// ── RAZORPAY BUY CREDITS ──
async function buyCredits(packType) {
  showToast('Creating order...', 'info');
  try {
    await CreatrixAPI.Payment.openCheckout(packType, async (result) => {
      showToast(`✅ ${result.credits_added} credits added!`, 'success');
      await loadUserData();
      await loadTransactionHistory();
    });
  } catch (err) {
    console.error('buyCredits ERROR:', err);
    showToast('Error: ' + (err.message || JSON.stringify(err)), 'error');
  }
}

// ── LOGOUT ──
async function logout() {
  if (!confirm('Logout from Creatrix AI?')) return;
  await CreatrixAPI.Auth.logout();
}

// ── TOAST ──
function showToast(msg, type = 'info') {
  let c = document.getElementById('toast-container');
  if (!c) {
    c = document.createElement('div');
    c.id = 'toast-container';
    c.style.cssText = 'position:fixed;top:80px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:10px;';
    document.body.appendChild(c);
  }
  const colors = { success:'#00F5D4', error:'#FF3CAC', info:'#784CFE', warning:'#FFD166' };
  const t = document.createElement('div');
  t.style.cssText = `background:#0F0F1E;border:1px solid ${colors[type]||colors.info};color:#F0EEF8;
    padding:0.75rem 1.25rem;border-radius:12px;font-size:0.88rem;max-width:320px;
    box-shadow:0 8px 32px rgba(0,0,0,0.4);`;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), 4000);
}

// ── BAR CHART ──
function buildBarChart() {
  const days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const vals = [8,12,5,15,10,6,6];
  const max = Math.max(...vals);
  const chart = document.getElementById('barChart');
  const labels = document.getElementById('barLabels');
  if (!chart || !labels) return;
  const colors = ['#784CFE','#FF3CAC','#00F5D4','#FFD166','#784CFE','#FF3CAC','#00F5D4'];
  days.forEach((d, i) => {
    const bar = document.createElement('div');
    bar.className = 'bar';
    bar.style.cssText = `height:4px;background:linear-gradient(to top,${colors[i]},${colors[(i+1)%colors.length]});opacity:0.8;flex:1;border-radius:5px 5px 0 0;transition:height 0.5s ease;`;
    chart.appendChild(bar);
    setTimeout(() => { bar.style.height = Math.round((vals[i]/max)*76)+'px'; }, 100+i*60);
    const lbl = document.createElement('div');
    lbl.className = 'bar-lbl';
    lbl.textContent = d;
    labels.appendChild(lbl);
  });
}

// ── WIRE BUY BUTTONS ──
function wireBuyButtons() {
  document.querySelectorAll('.pack-buy-btn:not([disabled])').forEach(btn => {
    const card = btn.closest('.pack-card');
    if (!card) return;
    const price = card.querySelector('.pack-price')?.textContent?.trim();
    if (price === '₹299') btn.onclick = () => buyCredits('creator');
    else if (price === '₹799') btn.onclick = () => buyCredits('pro');
    else if (price === '₹199') btn.onclick = () => buyCredits('spark');
  });

  const heroBuyBtn = document.querySelector('.credits-hero-card .buy-btn');
  if (heroBuyBtn) heroBuyBtn.onclick = () => buyCredits('creator');

  const userRow = document.querySelector('.user-row');
  if (userRow) {
    userRow.style.cursor = 'pointer';
    userRow.title = 'Click to logout';
    userRow.onclick = logout;
  }
}

// ── INIT ──
document.addEventListener('DOMContentLoaded', () => {
  buildBarChart();
  wireBuyButtons();
  loadUserData();
});
</script>
</body>
</html>
