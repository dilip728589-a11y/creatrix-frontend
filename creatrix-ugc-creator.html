<!DOCTYPE html>
<html lang="en">
<head>
<script type="text/javascript">
(function(c,l,a,r,i,t,y){
c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
})(window, document, "clarity", "script", "wnqtcqu7ae");
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI UGC Creator — Creatrix AI</title>
<link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700;800&family=Cabinet+Grotesk:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#04040A;--bg2:#080812;--card:#0F0F1E;--card2:#161628;--white:#F0EEF8;--muted:#7070A0;--muted2:#3A3A5C;--accent:#FF3CAC;--accent2:#784CFE;--accent3:#00F5D4;--gold:#FFD166;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--font-h:'Clash Display',sans-serif;--font-b:'Cabinet Grotesk',sans-serif;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{background:var(--bg);color:var(--white);font-family:var(--font-b);overflow-x:hidden;}
.topbar{position:fixed;top:0;left:0;right:0;z-index:200;height:62px;background:rgba(4,4,10,0.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 2.5rem;}
.tb-left{display:flex;align-items:center;gap:1.25rem;}
.back-btn{color:var(--muted);font-size:0.85rem;font-weight:500;text-decoration:none;transition:color 0.2s;}
.back-btn:hover{color:var(--white);}
.tb-div{width:1px;height:18px;background:var(--border2);}
.tb-logo{font-family:var(--font-h);font-size:1.15rem;font-weight:700;text-decoration:none;color:var(--white);}
.tb-logo span{background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.credits-pill{display:flex;align-items:center;gap:7px;background:var(--card);border:1px solid var(--border2);border-radius:100px;padding:0.38rem 1rem;font-size:0.8rem;}
.credits-pill .cv{font-family:var(--font-h);font-weight:700;color:var(--accent3);}
.credits-pill .cl{color:var(--muted);}
.tab-bar{position:fixed;top:62px;left:0;right:0;z-index:100;background:rgba(4,4,10,0.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 2.5rem;overflow-x:auto;}
.tab{padding:0.9rem 1.4rem;font-size:0.85rem;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s;white-space:nowrap;text-decoration:none;display:flex;align-items:center;gap:7px;}
.tab:hover{color:var(--white);}
.tab.active{color:var(--white);border-bottom-color:var(--accent2);}
.page-wrap{padding-top:110px;min-height:100vh;display:grid;grid-template-columns:1fr;max-width:1300px;margin:0 auto;padding-left:2.5rem;padding-right:2.5rem;padding-bottom:4rem;}
.left-panel{padding-right:0;padding-top:2rem;max-width:780px;}
.section-title{font-family:var(--font-h);font-size:1.5rem;font-weight:800;letter-spacing:-0.02em;margin-bottom:0.35rem;}
.section-sub{color:var(--muted);font-size:0.88rem;margin-bottom:2rem;line-height:1.6;}
.form-group{margin-bottom:1.75rem;}
.form-label{font-size:0.7rem;font-weight:700;letter-spacing:0.11em;text-transform:uppercase;color:var(--muted);margin-bottom:0.85rem;display:flex;align-items:center;gap:8px;}
.form-label::after{content:'';flex:1;height:1px;background:var(--border);}
.req{font-size:0.68rem;color:var(--accent);font-weight:700;text-transform:none;letter-spacing:0;}
.opt{font-size:0.62rem;text-transform:none;letter-spacing:0;color:var(--muted2);font-weight:400;}

/* INFLUENCER SELECTOR */
.inf-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:0.85rem;}
.inf-card{border-radius:14px;overflow:hidden;border:2.5px solid var(--border);cursor:pointer;transition:all 0.2s;position:relative;background:var(--card);}
.inf-card:hover{border-color:rgba(255,255,255,0.2);transform:translateY(-2px);}
.inf-card.sel{border-color:var(--accent2);box-shadow:0 0 0 3px rgba(120,76,254,0.2);}
.inf-card img{width:100%;aspect-ratio:3/4;object-fit:cover;object-position:top;display:block;min-height:120px;}
.inf-card-name{padding:5px 6px;font-size:0.66rem;font-weight:600;text-align:center;background:var(--card2);}
.inf-ck{position:absolute;top:6px;right:6px;width:20px;height:20px;background:var(--accent2);border-radius:50%;display:none;align-items:center;justify-content:center;font-size:0.58rem;color:#fff;}
.inf-card.sel .inf-ck{display:flex;}
/* Upload own card */
.inf-upload-card{border-radius:14px;border:2px dashed var(--muted2);cursor:pointer;transition:all 0.2s;background:var(--card);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;aspect-ratio:3/4;min-height:140px;padding:0.5rem;text-align:center;}
.inf-upload-card:hover{border-color:var(--accent2);background:rgba(120,76,254,0.05);transform:translateY(-2px);}
.inf-upload-card.has-img{border-style:solid;border-color:var(--accent2);}
.iuc-icon{font-size:1.5rem;}
.iuc-lbl{font-size:0.62rem;font-weight:700;color:var(--muted);}

/* UGC STYLE CARDS */
.ugc-style-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:1rem;}
.ugc-card{background:var(--card);border:2px solid var(--border);border-radius:18px;padding:1.25rem 1rem;cursor:pointer;transition:all 0.22s;text-align:center;position:relative;}
.ugc-card:hover{border-color:rgba(255,255,255,0.2);transform:translateY(-3px);box-shadow:0 12px 28px rgba(0,0,0,0.35);}
.ugc-card.sel{border-color:var(--accent2);background:rgba(120,76,254,0.08);box-shadow:0 0 0 3px rgba(120,76,254,0.18);}
.ugc-card-icon{font-size:2rem;margin-bottom:0.6rem;}
.ugc-card-name{font-family:var(--font-h);font-size:0.88rem;font-weight:700;margin-bottom:0.3rem;}
.ugc-card-desc{font-size:0.68rem;color:var(--muted);line-height:1.45;}
.ugc-card-check{position:absolute;top:8px;right:8px;width:20px;height:20px;background:var(--accent2);border-radius:50%;display:none;align-items:center;justify-content:center;font-size:0.6rem;color:#fff;}
.ugc-card.sel .ugc-card-check{display:flex;}

/* PRODUCT UPLOAD */
.product-upload{border:2px dashed var(--muted2);border-radius:18px;padding:1.75rem;text-align:center;cursor:pointer;transition:all 0.25s;position:relative;}
.product-upload:hover{border-color:var(--accent2);background:rgba(120,76,254,0.04);}
.product-upload.has-img{border-style:solid;border-color:var(--accent3);background:rgba(0,245,212,0.03);}
.pu-icon{font-size:2.2rem;margin-bottom:0.6rem;}
.pu-title{font-family:var(--font-h);font-size:0.9rem;font-weight:700;margin-bottom:0.3rem;}
.pu-sub{font-size:0.73rem;color:var(--muted);margin-bottom:1rem;}
.pu-btn{display:inline-flex;align-items:center;gap:6px;background:var(--card2);border:1px solid var(--border2);color:var(--muted);padding:0.42rem 1rem;border-radius:100px;font-size:0.76rem;font-weight:600;cursor:pointer;font-family:var(--font-b);transition:all 0.18s;}
.pu-btn:hover{color:var(--white);border-color:rgba(255,255,255,0.2);}
.pu-preview{display:none;align-items:center;gap:12px;background:var(--card2);border-radius:12px;padding:0.75rem 1rem;}
.pu-preview.show{display:flex;}
.pu-prev-img{width:52px;height:52px;border-radius:10px;object-fit:cover;display:block;}
.pu-prev-name{font-size:0.82rem;font-weight:600;flex:1;text-align:left;}
.pu-prev-size{font-size:0.68rem;color:var(--muted);}
.pu-remove{color:var(--muted);cursor:pointer;font-size:0.9rem;padding:4px;}
.pu-remove:hover{color:var(--accent);}

/* TEXTAREA */
.ta{width:100%;background:var(--card);border:1.5px solid var(--border2);color:var(--white);padding:0.9rem 1rem;border-radius:14px;font-size:0.88rem;font-family:var(--font-b);resize:none;outline:none;line-height:1.65;transition:border-color 0.2s;}
.ta:focus{border-color:var(--accent2);}
.ta::placeholder{color:var(--muted2);}
.hint-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:7px;}
.htag{font-size:0.68rem;padding:3px 9px;border-radius:100px;background:var(--card2);border:1px solid var(--border);color:var(--muted);cursor:pointer;transition:all 0.18s;}
.htag:hover{border-color:var(--accent2);color:var(--accent2);}

/* CHIP GRID */
.chip-grid{display:flex;flex-wrap:wrap;gap:8px;}
.chip{padding:0.42rem 0.95rem;border-radius:100px;border:1.5px solid var(--border2);background:var(--card);color:var(--muted);font-size:0.8rem;font-weight:600;cursor:pointer;transition:all 0.18s;}
.chip:hover{border-color:rgba(255,255,255,0.2);color:var(--white);}
.chip.sel{background:rgba(120,76,254,0.15);border-color:var(--accent2);color:var(--white);}

/* INPUT */
.text-input{width:100%;background:var(--card);border:1.5px solid var(--border2);color:var(--white);padding:0.8rem 1rem;border-radius:12px;font-size:0.88rem;font-family:var(--font-b);outline:none;transition:border-color 0.2s;}
.text-input:focus{border-color:var(--accent2);}
.text-input::placeholder{color:var(--muted2);}

/* TOGGLE */
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:0.75rem 1rem;background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:0.6rem;}
.ti-name{font-size:0.85rem;font-weight:600;}
.ti-sub{font-size:0.7rem;color:var(--muted);margin-top:1px;}
.toggle{position:relative;width:40px;height:22px;flex-shrink:0;}
.toggle input{opacity:0;width:0;height:0;}
.tslider{position:absolute;inset:0;background:var(--muted2);border-radius:100px;cursor:pointer;transition:background 0.25s;}
.tslider::before{content:'';position:absolute;width:16px;height:16px;left:3px;top:3px;background:#fff;border-radius:50%;transition:transform 0.25s;}
.toggle input:checked+.tslider{background:linear-gradient(90deg,var(--accent2),var(--accent));}
.toggle input:checked+.tslider::before{transform:translateX(18px);}

/* RIGHT PANEL */
.right-panel{display:none !important;}
.preview-box{background:var(--card);border:1px solid var(--border);border-radius:20px;overflow:hidden;}
.preview-head{padding:1rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.ph-title{font-family:var(--font-h);font-size:0.88rem;font-weight:700;}
.ph-badge{font-size:0.65rem;font-weight:700;padding:2px 9px;border-radius:100px;background:rgba(255,209,102,0.12);color:var(--gold);border:1px solid rgba(255,209,102,0.2);}
.preview-area{position:relative;aspect-ratio:9/16;background:var(--card2);display:flex;align-items:center;justify-content:center;overflow:hidden;max-height:360px;}
.pa-img{width:100%;height:100%;object-fit:cover;object-position:top;display:block;}
.pa-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(4,4,10,0.92),transparent 60%);}
.pa-empty{text-align:center;padding:2rem;}
.pa-empty-icon{font-size:2.5rem;opacity:0.2;margin-bottom:0.5rem;}
.pa-empty-text{font-size:0.78rem;color:var(--muted);font-family:var(--font-h);}
.pa-info{position:absolute;bottom:0;left:0;right:0;padding:1rem;}
.pa-style{font-size:0.68rem;font-weight:700;color:var(--gold);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:3px;}
.pa-name{font-family:var(--font-h);font-size:0.95rem;font-weight:800;}
.pa-brand{font-size:0.72rem;color:rgba(255,255,255,0.6);margin-top:2px;}

/* SUMMARY */
.summary-box{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:1.15rem;}
.sb-title{font-size:0.66rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted2);margin-bottom:0.85rem;}
.sb-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.sb-item{background:var(--card2);border-radius:10px;padding:0.48rem 0.7rem;}
.sb-key{font-size:0.58rem;color:var(--muted2);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:1px;}
.sb-val{font-size:0.76rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cost-box{background:rgba(255,209,102,0.06);border:1px solid rgba(255,209,102,0.18);border-radius:12px;padding:0.85rem 1rem;display:flex;align-items:center;justify-content:space-between;}
.cb-left{font-size:0.78rem;color:var(--muted);}
.cb-left strong{font-family:var(--font-h);font-size:1.05rem;color:var(--gold);}
.cb-right{font-size:0.7rem;color:var(--muted2);}
.gen-btn{width:100%;padding:1rem;border:none;border-radius:14px;background:linear-gradient(135deg,var(--gold),#f0a500);color:#1a1000;font-family:var(--font-h);font-weight:800;font-size:1rem;cursor:pointer;transition:opacity 0.2s,transform 0.15s;display:flex;align-items:center;justify-content:center;gap:10px;}
.gen-btn:hover{opacity:0.88;transform:translateY(-1px);}

/* RECENT */
.recent-section{margin-top:2.5rem;}
.rs-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.1rem;}
.rs-title{font-family:var(--font-h);font-size:1.05rem;font-weight:700;}
.recent-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:1rem;}
.rc{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;transition:transform 0.2s,box-shadow 0.2s;}
.rc:hover{transform:translateY(-3px);box-shadow:0 12px 30px rgba(0,0,0,0.4);}
.rc-thumb{position:relative;aspect-ratio:9/16;max-height:160px;overflow:hidden;}
.rc-thumb img{width:100%;height:100%;object-fit:cover;object-position:top;display:block;transition:transform 0.4s;}
.rc:hover .rc-thumb img{transform:scale(1.05);}
.rc-badge{position:absolute;top:6px;left:6px;background:rgba(255,209,102,0.85);color:#1a1000;font-size:0.58rem;font-weight:700;padding:2px 7px;border-radius:100px;}
.rc-dur{position:absolute;bottom:6px;right:6px;background:rgba(0,0,0,0.7);font-size:0.62rem;font-weight:700;padding:1px 6px;border-radius:100px;}
.rc-info{padding:0.65rem 0.8rem;}
.rc-name{font-size:0.78rem;font-weight:700;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rc-meta{font-size:0.65rem;color:var(--muted);}
.rc-actions{display:flex;gap:5px;margin-top:7px;}
.rc-btn{flex:1;padding:4px;background:var(--card2);border:1px solid var(--border2);border-radius:7px;color:var(--muted);font-size:0.62rem;font-weight:600;cursor:pointer;text-align:center;transition:all 0.15s;}
.rc-btn:hover{color:var(--white);}

/* LOADING */
.loading-overlay{position:fixed;inset:0;background:rgba(4,4,10,0.92);backdrop-filter:blur(12px);z-index:999;display:none;align-items:center;justify-content:center;flex-direction:column;gap:1.5rem;}
.loading-overlay.show{display:flex;}
.loading-ring{width:70px;height:70px;border:3px solid rgba(255,255,255,0.1);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-title{font-family:var(--font-h);font-size:1.3rem;font-weight:700;}
.loading-sub{color:var(--muted);font-size:0.88rem;}
.loading-bar-wrap{width:280px;height:4px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden;}
.loading-bar{height:100%;background:linear-gradient(90deg,var(--gold),var(--accent));border-radius:2px;width:0%;animation:loadProg 5s ease forwards;}
@keyframes loadProg{0%{width:0%}70%{width:80%}95%{width:95%}100%{width:100%}}

::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--muted2);border-radius:2px;}
@media(max-width:1000px){.page-wrap{grid-template-columns:1fr;}.right-panel{border-left:none;border-top:1px solid var(--border);position:static;height:auto;padding-left:0;padding-top:1.5rem;}}
@media(max-width:600px){.tab-bar{padding:0 1rem;}.tab{padding:0.75rem 0.85rem;font-size:0.78rem;}.ugc-style-grid{grid-template-columns:repeat(2,1fr);}}
</style>
<script src="api.js"></script>
</body>
</html>
