<title>Aria Nova — Exclusive Content</title>

<style>
:root{--bg:#04040A;--card:#0F0F1E;--card2:#161628;--white:#F0EEF8;--muted:#7070A0;--muted2:#3A3A5C;--accent:#FF3CAC;--accent2:#784CFE;--accent3:#00F5D4;--gold:#FFD166;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--font-h:'Clash Display',sans-serif;--font-b:'Cabinet Grotesk',sans-serif;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--white);font-family:var(--font-b);min-height:100vh;}

/* BG GLOW */
.bg-glow{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.bg-glow::before{content:'';position:absolute;top:-20%;left:50%;transform:translateX(-50%);width:600px;height:600px;background:radial-gradient(circle,rgba(120,76,254,0.12),transparent 70%);}
.bg-glow::after{content:'';position:absolute;bottom:-10%;right:-10%;width:400px;height:400px;background:radial-gradient(circle,rgba(255,60,172,0.08),transparent 70%);}

/* WRAPPER */
.wrapper{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:2rem 1.25rem 4rem;}

/* PROFILE HEADER */
.profile-header{text-align:center;padding:2rem 0 1.5rem;}
.profile-avatar{position:relative;display:inline-block;margin-bottom:1rem;}
.avatar-img{width:96px;height:96px;border-radius:50%;object-fit:cover;object-position:top;border:3px solid transparent;background:linear-gradient(var(--bg),var(--bg)) padding-box, linear-gradient(135deg,var(--accent),var(--accent2)) border-box;}
.avatar-live{position:absolute;bottom:4px;right:4px;width:18px;height:18px;background:var(--accent3);border-radius:50%;border:2px solid var(--bg);display:flex;align-items:center;justify-content:center;}
.avatar-live::after{content:'';width:6px;height:6px;background:#000;border-radius:50%;}
.profile-name{font-family:var(--font-h);font-size:1.5rem;font-weight:800;margin-bottom:4px;}
.profile-handle{font-size:0.82rem;color:var(--muted);margin-bottom:0.75rem;}
.profile-bio{font-size:0.85rem;color:rgba(255,255,255,0.7);line-height:1.6;max-width:300px;margin:0 auto 1rem;}
.profile-tags{display:flex;justify-content:center;gap:6px;flex-wrap:wrap;margin-bottom:1.25rem;}
.ptag{font-size:0.68rem;padding:3px 10px;border-radius:100px;background:var(--card2);border:1px solid var(--border2);color:var(--muted);}

/* STATS BAR */
.stats-bar{display:flex;justify-content:center;gap:2rem;margin-bottom:1.5rem;}
.sb-item{text-align:center;}
.sb-val{font-family:var(--font-h);font-size:1.1rem;font-weight:800;}
.sb-lbl{font-size:0.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;margin-top:1px;}

/* UNLOCK ALL BANNER */
.unlock-banner{background:linear-gradient(135deg,rgba(255,60,172,0.15),rgba(120,76,254,0.15));border:1.5px solid rgba(255,60,172,0.3);border-radius:18px;padding:1.25rem 1.5rem;margin-bottom:1.75rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;cursor:pointer;transition:all 0.2s;}
.unlock-banner:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(255,60,172,0.2);}
.ub-left{}
.ub-title{font-family:var(--font-h);font-size:1rem;font-weight:800;margin-bottom:3px;}
.ub-sub{font-size:0.75rem;color:rgba(255,255,255,0.6);}
.ub-btn{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-family:var(--font-h);font-size:0.82rem;font-weight:700;padding:0.6rem 1.25rem;border-radius:100px;border:none;cursor:pointer;white-space:nowrap;transition:opacity 0.2s;}
.ub-btn:hover{opacity:0.88;}

/* CONTENT SECTIONS */
.content-section{margin-bottom:2rem;}
.cs-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
.cs-title{font-family:var(--font-h);font-size:0.95rem;font-weight:700;display:flex;align-items:center;gap:7px;}
.cs-count{font-size:0.68rem;color:var(--muted);background:var(--card2);padding:2px 8px;border-radius:100px;border:1px solid var(--border2);}

/* CONTENT GRID */
.content-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;}
.content-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.6rem;}

/* CONTENT ITEM */
.ci{border-radius:16px;overflow:hidden;position:relative;cursor:pointer;transition:transform 0.2s;}
.ci:hover{transform:scale(1.02);}
.ci-thumb{position:relative;aspect-ratio:9/16;overflow:hidden;}
.ci-thumb img{width:100%;height:100%;object-fit:cover;object-position:top;display:block;transition:transform 0.4s;}
.ci:hover .ci-thumb img{transform:scale(1.05);}

/* BLUR LOCKED */
.ci-blur{position:absolute;inset:0;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);background:rgba(4,4,10,0.5);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;transition:all 0.2s;}
.ci:hover .ci-blur{background:rgba(4,4,10,0.4);}
.ci-lock{font-size:1.5rem;}
.ci-price{font-family:var(--font-h);font-size:0.88rem;font-weight:800;color:var(--gold);}
.ci-unlock-btn{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-family:var(--font-h);font-size:0.68rem;font-weight:700;padding:4px 12px;border-radius:100px;border:none;cursor:pointer;opacity:0;transition:opacity 0.2s;}
.ci:hover .ci-unlock-btn{opacity:1;}

/* FREE CONTENT overlay */
.ci-free-badge{position:absolute;top:6px;left:6px;background:rgba(0,245,212,0.85);color:#000;font-size:0.58rem;font-weight:700;padding:2px 7px;border-radius:100px;backdrop-filter:blur(4px);}
.ci-type-badge{position:absolute;top:6px;right:6px;background:rgba(0,0,0,0.6);color:#fff;font-size:0.58rem;font-weight:700;padding:2px 7px;border-radius:100px;backdrop-filter:blur(4px);}

/* FOMO TICKER */
.fomo-bar{background:rgba(255,60,172,0.08);border:1px solid rgba(255,60,172,0.2);border-radius:12px;padding:0.65rem 1rem;margin-bottom:1.5rem;display:flex;align-items:center;gap:8px;font-size:0.75rem;overflow:hidden;}
.fomo-dot{width:6px;height:6px;background:var(--accent);border-radius:50%;flex-shrink:0;animation:blink 1.5s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.fomo-text{color:rgba(255,255,255,0.7);}
.fomo-name{color:var(--white);font-weight:700;}

/* FOOTER */
.bio-footer{text-align:center;margin-top:2.5rem;padding-top:1.5rem;border-top:1px solid var(--border);}
.bf-logo{font-family:var(--font-h);font-size:0.85rem;font-weight:700;color:var(--muted);text-decoration:none;}
.bf-logo span{color:var(--accent2);}
.bf-sub{font-size:0.68rem;color:var(--muted2);margin-top:4px;}

/* PAYMENT MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(4,4,10,0.92);backdrop-filter:blur(12px);z-index:500;display:none;align-items:flex-end;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal{background:var(--card);border:1px solid var(--border2);border-radius:28px 28px 0 0;padding:2rem 1.5rem;width:100%;max-width:480px;animation:slideUp 0.3s ease both;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:40px;height:4px;background:var(--muted2);border-radius:2px;margin:0 auto 1.5rem;}
.modal-content-preview{display:flex;gap:1rem;align-items:center;background:var(--card2);border-radius:16px;padding:0.85rem;margin-bottom:1.25rem;}
.mcp-img{width:56px;height:72px;border-radius:10px;object-fit:cover;object-position:top;display:block;filter:blur(4px);}
.mcp-info{}
.mcp-name{font-family:var(--font-h);font-size:0.9rem;font-weight:700;margin-bottom:3px;}
.mcp-type{font-size:0.68rem;color:var(--muted);}
.mcp-price{font-family:var(--font-h);font-size:1.1rem;font-weight:800;color:var(--gold);margin-top:4px;}
.payment-methods{display:flex;gap:0.5rem;margin-bottom:1.25rem;}
.pm{flex:1;padding:0.65rem;background:var(--card2);border:1.5px solid var(--border2);border-radius:12px;text-align:center;cursor:pointer;transition:all 0.18s;}
.pm:hover{border-color:rgba(255,255,255,0.2);}
.pm.sel{border-color:var(--accent2);background:rgba(120,76,254,0.1);}
.pm-icon{font-size:1.2rem;display:block;margin-bottom:3px;}
.pm-lbl{font-size:0.65rem;color:var(--muted);font-weight:600;}
.pay-btn{width:100%;padding:1rem;border:none;border-radius:14px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-family:var(--font-h);font-weight:800;font-size:1rem;cursor:pointer;margin-bottom:0.75rem;transition:opacity 0.2s;}
.pay-btn:hover{opacity:0.88;}
.secure-note{text-align:center;font-size:0.68rem;color:var(--muted2);display:flex;align-items:center;justify-content:center;gap:5px;}

/* SUCCESS */
.success-overlay{position:fixed;inset:0;background:rgba(4,4,10,0.95);backdrop-filter:blur(12px);z-index:600;display:none;align-items:center;justify-content:center;flex-direction:column;gap:1rem;text-align:center;padding:2rem;}
.success-overlay.show{display:flex;}
.success-anim{font-size:4rem;animation:popIn 0.5s ease both;}
@keyframes popIn{0%{transform:scale(0)}70%{transform:scale(1.2)}100%{transform:scale(1)}}
.success-title{font-family:var(--font-h);font-size:1.75rem;font-weight:800;}
.success-sub{color:var(--muted);font-size:0.88rem;line-height:1.65;}
.success-view-btn{background:linear-gradient(135deg,var(--accent3),var(--accent2));color:#fff;font-family:var(--font-h);font-size:0.9rem;font-weight:700;padding:0.85rem 2rem;border-radius:14px;border:none;cursor:pointer;margin-top:0.5rem;}

::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--muted2);border-radius:2px;}

/* ── PREMIUM UX POLISH ── */
html { scroll-behavior: smooth; }
body { background: linear-gradient(160deg, #04040A 0%, #060610 100%); }

/* Bg glow polish */
.bg-glow::before { background: radial-gradient(circle, rgba(120,76,254,0.14), transparent 70%); width:700px; height:700px; }
.bg-glow::after { background: radial-gradient(circle, rgba(255,60,172,0.1), transparent 70%); width:500px; height:500px; }

/* Avatar */
.avatar-img { box-shadow: 0 0 0 3px rgba(120,76,254,0.3), 0 8px 32px rgba(0,0,0,0.5); }
.avatar-live { box-shadow: 0 0 0 3px rgba(4,4,10,1), 0 0 8px var(--accent3); }
.profile-name { font-size:1.6rem; font-weight:800; letter-spacing:-0.02em; }
.profile-bio { color:rgba(200,196,240,0.75); }
.ptag { font-size:0.66rem; border-radius:100px; transition:all 0.2s; }
.ptag:hover { border-color:rgba(255,255,255,0.2); color:var(--white); }

/* Stats bar */
.sb-val { font-size:1.2rem; font-weight:800; letter-spacing:-0.02em; background:linear-gradient(90deg,var(--white),rgba(200,196,240,0.8)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.sb-lbl { font-size:0.6rem; letter-spacing:0.1em; }

/* Unlock banner */
.unlock-banner { background:linear-gradient(135deg, rgba(255,60,172,0.12), rgba(120,76,254,0.12)); border:1px solid rgba(255,60,172,0.25); box-shadow:0 8px 32px rgba(255,60,172,0.12); border-radius:20px; }
.unlock-banner:hover { transform:translateY(-3px); box-shadow:0 16px 48px rgba(255,60,172,0.22); }
.ub-title { font-size:1.05rem; font-weight:800; letter-spacing:-0.01em; }
.ub-btn { border-radius:100px; box-shadow:0 4px 16px rgba(255,60,172,0.3); letter-spacing:0.02em; }
.ub-btn:hover { opacity:0.9; transform:scale(1.03); }

/* Section title */
.cs-title { font-size:0.9rem; font-weight:700; letter-spacing:-0.01em; }

/* Content items */
.ci { border-radius:18px; box-shadow:0 4px 20px rgba(0,0,0,0.4); }
.ci:hover { transform:scale(1.03); box-shadow:0 12px 36px rgba(0,0,0,0.5); }
.ci-blur { backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); }
.ci-price { font-size:0.9rem; text-shadow:0 2px 8px rgba(0,0,0,0.5); }
.ci-unlock-btn { border-radius:100px; font-size:0.7rem; padding:5px 14px; }

/* Fomo bar */
.fomo-bar { background:rgba(255,60,172,0.06); border:1px solid rgba(255,60,172,0.18); border-radius:14px; }

/* Footer */
.bf-logo { font-weight:700; font-size:0.88rem; transition:color 0.2s; }
.bf-logo:hover { color:var(--white); }

/* Payment modal */
.modal { background:linear-gradient(160deg, rgba(15,15,30,1), rgba(10,10,22,1)); border:1px solid rgba(255,255,255,0.1); box-shadow:0 -8px 64px rgba(0,0,0,0.6); }
.modal-content-preview { background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.07); border-radius:18px; }
.pm { border-radius:14px; transition:all 0.2s; }
.pm.sel { box-shadow:0 0 0 2px rgba(120,76,254,0.3); }
.pm:hover { transform:translateY(-2px); }
.pay-btn { border-radius:14px; box-shadow:0 6px 24px rgba(255,60,172,0.3); letter-spacing:0.02em; }
.pay-btn:hover { opacity:0.9; transform:translateY(-1px); box-shadow:0 10px 32px rgba(255,60,172,0.4); }

/* ── PREMIUM UX POLISH v2 ── */
html { scroll-behavior: smooth; }
body { animation: bodyFadeIn 0.35s ease both; background: linear-gradient(160deg, #04040A 0%, #060610 100%); }
@keyframes bodyFadeIn { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }

/* Topbar */
.topbar { background: rgba(6,6,18,0.92) !important; backdrop-filter: blur(24px) !important; border-bottom: 1px solid rgba(255,255,255,0.06) !important; box-shadow: 0 1px 0 rgba(255,255,255,0.04), 0 4px 24px rgba(0,0,0,0.4) !important; }
.tb-logo { font-weight: 800 !important; letter-spacing: -0.03em !important; }
.back-btn { padding: 4px 10px; border-radius: 8px; transition: all 0.2s; }
.back-btn:hover { color: var(--white) !important; background: rgba(255,255,255,0.05); }
.credits-pill, .cp { background: rgba(15,15,28,0.9) !important; border: 1px solid rgba(255,255,255,0.1) !important; box-shadow: 0 4px 16px rgba(0,0,0,0.3); }

/* Typography hierarchy */
h1, h2, .section-title, .page-title { font-weight: 800; letter-spacing: -0.03em; }
h3, .card-title, .tool-name, .inf-name { font-weight: 800; letter-spacing: -0.02em; }
p, .desc, .sub, .meta { color: rgba(200,195,235,0.65); line-height: 1.75; }
label, .label, .caption { color: rgba(160,155,200,0.5); letter-spacing: 0.08em; font-size: 0.72rem; font-weight: 700; }

/* Spacing rhythm */
section, .page-section { padding: 4rem 0; }

/* Tab bar */
.tab-bar { background: rgba(6,6,18,0.92) !important; backdrop-filter: blur(24px); border-bottom: 1px solid rgba(255,255,255,0.06) !important; }
.tab { font-size: 0.84rem; letter-spacing: 0.01em; transition: all 0.2s; }
.tab.active { color: var(--white); }

/* Cards - premium depth */
.section-card, .card-block, .info-card, .instructions, .bio-link-card {
  background: linear-gradient(160deg, rgba(15,15,30,1), rgba(10,10,20,1)) !important;
  border: 1px solid rgba(255,255,255,0.07) !important;
  border-radius: 20px !important;
  box-shadow: 0 2px 16px rgba(0,0,0,0.3);
}

/* Upload zones */
.upload-zone { border-radius: 20px; transition: all 0.25s; }
.upload-zone:hover { border-color: rgba(120,76,254,0.5) !important; background: rgba(120,76,254,0.05) !important; transform: translateY(-1px); }

/* Model/style cards */
.model-card, .style-card, .ugc-style-card {
  border-radius: 16px !important;
  transition: all 0.22s cubic-bezier(0.34,1.2,0.64,1) !important;
  background: linear-gradient(160deg, rgba(15,15,30,1), rgba(10,10,20,1)) !important;
}
.model-card:hover, .style-card:hover, .ugc-style-card:hover { border-color: rgba(120,76,254,0.4) !important; transform: translateY(-3px) !important; box-shadow: 0 12px 28px rgba(0,0,0,0.4) !important; }
.model-card.active, .style-card.active, .ugc-style-card.active { border-color: var(--accent2) !important; box-shadow: 0 0 0 2px rgba(120,76,254,0.2), 0 8px 24px rgba(0,0,0,0.4) !important; }

/* Generate buttons */
.gen-btn, .generate-btn { border-radius: 16px !important; box-shadow: 0 6px 24px rgba(255,60,172,0.3) !important; letter-spacing: 0.02em; transition: all 0.2s cubic-bezier(0.34,1.2,0.64,1) !important; }
.gen-btn:hover, .generate-btn:hover { opacity: 0.92 !important; transform: translateY(-2px) !important; box-shadow: 0 12px 40px rgba(255,60,172,0.4) !important; }

/* Right panels */
.right-panel { background: rgba(8,8,18,0.5) !important; border-left: 1px solid rgba(255,255,255,0.05) !important; }

/* Inputs */
textarea, input[type="text"], input[type="url"], input[type="email"] {
  border-radius: 14px !important; background: rgba(15,15,28,0.8) !important;
  border: 1px solid rgba(255,255,255,0.1) !important; transition: all 0.2s !important;
  color: var(--white) !important; font-family: var(--font-b);
}
textarea:focus, input[type="text"]:focus, input[type="url"]:focus, input[type="email"]:focus {
  border-color: var(--accent2) !important; box-shadow: 0 0 0 3px rgba(120,76,254,0.1) !important; outline: none !important;
}

/* Modals */
.modal, .detail-modal, .modal-overlay > div {
  background: linear-gradient(160deg, rgba(15,15,30,1), rgba(10,10,22,1)) !important;
  border: 1px solid rgba(255,255,255,0.1) !important; border-radius: 28px !important;
  box-shadow: 0 24px 80px rgba(0,0,0,0.7) !important;
}

/* Buttons all */
button, .btn { transition: all 0.2s; }
.buy-btn, .cta-btn { box-shadow: 0 6px 24px rgba(255,60,172,0.3) !important; border-radius: 14px !important; }
.buy-btn:hover, .cta-btn:hover { opacity: 0.92 !important; transform: translateY(-2px) !important; box-shadow: 0 12px 40px rgba(255,60,172,0.4) !important; }

/* Status badges */
.status-done, .badge-done { background: rgba(0,245,212,0.1) !important; color: var(--accent3) !important; border: 1px solid rgba(0,245,212,0.2) !important; }
.status-proc, .badge-proc { background: rgba(120,76,254,0.1) !important; color: var(--accent2) !important; border: 1px solid rgba(120,76,254,0.2) !important; }

/* Page headers */
.page-header h1, .section-title-lg { font-family: var(--font-h); font-size: 1.65rem; font-weight: 800; letter-spacing: -0.03em; }
.page-header p { color: rgba(160,155,200,0.55); font-size: 0.87rem; line-height: 1.6; }

/* Toast */
.toast { border-radius: 18px !important; backdrop-filter: blur(16px) !important; box-shadow: 0 8px 32px rgba(0,0,0,0.5) !important; }

/* Page tabs (monetize) */
.page-tabs { background: rgba(6,6,18,0.92) !important; backdrop-filter: blur(24px); border-bottom: 1px solid rgba(255,255,255,0.06) !important; }
.ptab.active { color: var(--white); border-bottom-color: var(--accent2); }

/* Section headings inside pages */
.section-title { font-size: 1.75rem !important; font-weight: 800 !important; letter-spacing: -0.03em !important; }
.section-sub { color: rgba(200,195,235,0.6) !important; line-height: 1.75 !important; }

/* Nav (terms page) */
nav { background: rgba(4,4,10,0.9) !important; backdrop-filter: blur(24px); box-shadow: 0 1px 0 rgba(255,255,255,0.03), 0 4px 20px rgba(0,0,0,0.3); }
.nav-signup { border-radius: 100px; box-shadow: 0 4px 16px rgba(255,60,172,0.3); transition: all 0.2s; }
.nav-signup:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 8px 28px rgba(255,60,172,0.4); }

/* Shimmer */
@keyframes shimmer { 0%{background-position:-400px 0} 100%{background-position:400px 0} }
.skeleton { background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 75%); background-size: 400px 100%; animation: shimmer 1.4s infinite; border-radius: 10px; }


/* ── MOBILE ── */
@media (max-width: 480px) {
  .wrapper { padding: 1.5rem 1rem 3rem; }
  .content-grid-2 { grid-template-columns: 1fr 1fr; gap: 0.6rem; }
  .content-grid-3 { grid-template-columns: 1fr 1fr 1fr; gap: 0.4rem; }
  .unlock-banner { flex-direction: column; gap: 0.75rem; text-align: center; }
