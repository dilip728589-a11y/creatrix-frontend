<!DOCTYPE html>
<html lang="en">
<head>
<script type="text/javascript">
(function(c,l,a,r,i,t,y){
c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
})(window, document, "clarity", "script", "wnqtcqu7ae");
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Your AI Influencer — Creatrix AI</title>
<link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700;800&family=Cabinet+Grotesk:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{background:var(--bg);color:var(--white);font-family:var(--font-b);overflow-x:hidden;}
.topbar{position:fixed;top:0;left:0;right:0;z-index:200;height:62px;background:rgba(4,4,10,0.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 2.5rem;}
.main{display:grid;grid-template-columns:260px 1fr;height:100vh;padding-top:62px;}
.sidebar{background:var(--bg2);border-right:1px solid var(--border);padding:1.75rem 1rem;position:sticky;top:62px;height:calc(100vh - 62px);overflow-y:auto !important;-webkit-overflow-scrolling:touch;}
.content-area{padding:2.5rem 2rem;overflow-y:auto;height:calc(100vh - 62px);}
.preview-col{display:none !important;}
.sub-page{display:none;}
.sub-page.active{display:block;animation:fadeSlide 0.3s ease both;}

:root{--bg:#04040A;--bg2:#080812;--card:#0F0F1E;--card2:#161628;--white:#F0EEF8;--muted:#7070A0;--muted2:#3A3A5C;--accent:#FF3CAC;--accent2:#784CFE;--accent3:#00F5D4;--gold:#FFD166;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--font-h:'Clash Display',sans-serif;--font-b:'Cabinet Grotesk',sans-serif;}




.tb-left{display:flex;align-items:center;gap:1.25rem;}
.back-btn{display:flex;align-items:center;gap:6px;color:var(--muted);font-size:0.85rem;font-weight:500;text-decoration:none;transition:color 0.2s;}
.back-btn:hover{color:var(--white);}
.tb-div{width:1px;height:18px;background:var(--border2);}
.tb-logo{font-family:var(--font-h);font-size:1.15rem;font-weight:700;text-decoration:none;color:var(--white);}
.tb-logo span{background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.cp{display:flex;align-items:center;gap:7px;background:var(--card);border:1px solid var(--border2);border-radius:100px;padding:0.38rem 1rem;font-size:0.8rem;}
.cp .cv{font-family:var(--font-h);font-weight:700;color:var(--accent3);}
.cp .cl{color:var(--muted);}


.sb-title{font-size:0.66rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted2);margin-bottom:1.1rem;padding-left:0.5rem;}
.step-list{display:flex;flex-direction:column;gap:3px;}
.si{display:flex;align-items:center;gap:10px;padding:0.7rem 0.85rem;border-radius:11px;cursor:pointer;transition:all 0.2s;position:relative;}
.si:hover{background:rgba(255,255,255,0.04);}
.si.active{background:rgba(120,76,254,0.12);}
.si.active::before{content:'';position:absolute;left:0;top:22%;bottom:22%;width:3px;border-radius:0 3px 3px 0;background:linear-gradient(180deg,var(--accent),var(--accent2));}
.si.done .sn{background:var(--accent3);border-color:var(--accent3);color:var(--bg);}
.sn{width:28px;height:28px;min-width:28px;border-radius:50%;border:1.5px solid var(--muted2);display:flex;align-items:center;justify-content:center;font-family:var(--font-h);font-size:0.72rem;font-weight:700;color:var(--muted);transition:all 0.3s;}
.si.active .sn{border-color:var(--accent2);color:var(--accent2);background:rgba(120,76,254,0.15);}
.sl{font-size:0.8rem;font-weight:600;color:var(--muted);}
.si.active .sl{color:var(--white);}
.si.done .sl{color:var(--accent3);}
.ss{font-size:0.66rem;color:var(--muted2);margin-top:1px;}
.si.done .ss{display:none;}
.ck{color:var(--accent3);font-size:0.8rem;margin-left:auto;display:none;}
.si.done .ck{display:block;}



@keyframes fadeSlide{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.eyebrow{font-size:0.68rem;font-weight:700;letter-spacing:0.13em;text-transform:uppercase;color:var(--accent);margin-bottom:0.45rem;}
.ptitle{font-family:var(--font-h);font-size:1.75rem;font-weight:800;letter-spacing:-0.02em;line-height:1.1;margin-bottom:0.45rem;}
.psub{color:var(--muted);font-size:0.9rem;line-height:1.65;margin-bottom:2rem;}
/* GENDER */
.gender-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.25rem;}
.gc{background:var(--card);border:2.5px solid var(--border);border-radius:22px;padding:2.25rem 1.25rem;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.85rem;cursor:pointer;transition:all 0.25s;}
.gc:hover{border-color:rgba(120,76,254,0.4);transform:translateY(-3px);}
.gc.sel{border-color:var(--accent2);background:rgba(120,76,254,0.1);}
.gi{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2.6rem;transition:transform 0.2s;}
.gc:hover .gi{transform:scale(1.08);}
.gl{font-family:var(--font-h);font-size:0.95rem;font-weight:700;}
.gr{width:22px;height:22px;border-radius:50%;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:0.62rem;transition:all 0.2s;}
.gc.sel .gr{background:var(--accent2);border-color:var(--accent2);color:#fff;}
/* IMG GRIDS */
.ig{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:1rem;}
.ig.wide{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));}
.ig.narrow{grid-template-columns:repeat(auto-fill,minmax(105px,1fr));}
.ig.age-g{grid-template-columns:repeat(4,1fr);}
.ic{border-radius:18px;overflow:hidden;border:2.5px solid var(--border);cursor:pointer;transition:border-color 0.2s,transform 0.2s,box-shadow 0.2s;position:relative;background:var(--card);}
.ic:hover{border-color:rgba(255,255,255,0.2);transform:translateY(-3px);box-shadow:0 12px 30px rgba(0,0,0,0.4);}
.ic.sel{border-color:var(--accent2);box-shadow:0 0 0 3px rgba(120,76,254,0.22);}
.ic-img{width:100%;aspect-ratio:3/4;object-fit:cover;object-position:top center;display:block;transition:transform 0.4s;}
.ic.sel .ic-img{transform:scale(1.03);}
.ic.age .ic-img{aspect-ratio:2/3;}
.ic.sq .ic-img{aspect-ratio:1;}
.ic-lbl{padding:7px 10px;font-size:0.76rem;font-weight:600;text-align:center;background:var(--card2);}
.ic-ck{position:absolute;top:8px;right:8px;width:22px;height:22px;background:var(--accent2);border-radius:50%;display:none;align-items:center;justify-content:center;font-size:0.62rem;color:#fff;font-weight:800;}
.ic.sel .ic-ck{display:flex;}
.ic-multi{position:absolute;top:8px;left:8px;background:rgba(0,0,0,0.55);backdrop-filter:blur(6px);font-size:0.58rem;padding:2px 7px;border-radius:100px;color:rgba(255,255,255,0.7);font-weight:700;}
/* feature sel uses pink */
.ic.feat.sel{border-color:var(--accent);}
.ic.feat.sel .ic-ck{background:var(--accent);}
/* NAV */
.pnav{display:flex;align-items:center;justify-content:space-between;margin-top:2.5rem;padding-top:1.75rem;border-top:1px solid var(--border);}
.btn-back{display:flex;align-items:center;gap:7px;background:var(--card);border:1px solid var(--border2);color:var(--muted);padding:0.72rem 1.5rem;border-radius:12px;font-size:0.88rem;font-weight:600;cursor:pointer;font-family:var(--font-b);transition:all 0.18s;}
.btn-back:hover{color:var(--white);border-color:rgba(255,255,255,0.2);}
.btn-next{display:flex;align-items:center;gap:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;padding:0.78rem 2rem;border-radius:12px;font-family:var(--font-h);font-size:0.92rem;font-weight:700;cursor:pointer;border:none;transition:opacity 0.2s,transform 0.15s;}
.btn-next:hover{opacity:0.88;transform:translateY(-1px);}
.sc{font-size:0.76rem;color:var(--muted);}
.sc strong{color:var(--white);font-family:var(--font-h);}
/* REVIEW */
.rs{background:var(--card);border:1px solid var(--border);border-radius:18px;overflow:hidden;margin-bottom:1rem;}
.rsh{display:flex;align-items:center;justify-content:space-between;padding:0.9rem 1.25rem;border-bottom:1px solid var(--border);}
.rst{font-family:var(--font-h);font-size:0.88rem;font-weight:700;}
.rse{font-size:0.7rem;color:var(--accent2);cursor:pointer;font-weight:600;}
.rsg{display:grid;grid-template-columns:1fr 1fr;}
.ri{padding:0.65rem 1.25rem;border-bottom:1px solid var(--border);}
.ri:nth-child(odd){border-right:1px solid var(--border);}
.ri:nth-last-child(-n+2){border-bottom:none;}
.rk{font-size:0.6rem;color:var(--muted2);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:2px;}
.rv{font-size:0.83rem;font-weight:600;}
.gen-btn{width:100%;padding:1.05rem;border:none;border-radius:16px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-family:var(--font-h);font-weight:800;font-size:1.05rem;cursor:pointer;transition:opacity 0.2s,transform 0.15s;display:flex;align-items:center;justify-content:center;gap:10px;margin-top:1.5rem;}
.gen-btn:hover{opacity:0.9;transform:translateY(-2px);}
/* PREVIEW COL */

.pvh{padding:1rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.pvh-t{font-family:var(--font-h);font-size:0.86rem;font-weight:700;}
.pvlive{display:flex;align-items:center;gap:5px;font-size:0.67rem;color:var(--accent3);}
.ld{width:6px;height:6px;background:var(--accent3);border-radius:50%;animation:blink 1.5s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.pvimg-wrap{flex:1;position:relative;overflow:hidden;background:var(--card);}
.pvimg{width:100%;height:100%;object-fit:cover;object-position:top;display:block;transition:opacity 0.5s;}
.pvoverlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(4,4,10,1) 0%,rgba(4,4,10,0.1) 55%,transparent 100%);}
.pvinfo{position:absolute;bottom:0;left:0;right:0;padding:1.1rem;}
.pvname{font-family:var(--font-h);font-size:1rem;font-weight:800;}
.pvtags{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px;}
.pvtag{font-size:0.6rem;padding:2px 8px;border-radius:100px;background:rgba(255,255,255,0.12);backdrop-filter:blur(4px);font-weight:600;}
.pvempty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.6rem;}
.pve-icon{font-size:3rem;opacity:0.2;}
.pve-text{font-size:0.82rem;color:var(--muted);font-family:var(--font-h);}
.pvsum{padding:0.9rem 1.1rem;flex-shrink:0;border-top:1px solid var(--border);}
.pvsg{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.psi{background:var(--card);border-radius:9px;padding:0.45rem 0.65rem;}
.psk{font-size:0.58rem;color:var(--muted2);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:1px;}
.psv{font-size:0.74rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
/* Toast */
.toast{position:fixed;bottom:2rem;right:2rem;z-index:999;background:var(--card2);border:1px solid var(--accent3);border-radius:14px;padding:0.9rem 1.1rem;display:flex;align-items:center;gap:10px;font-size:0.86rem;transform:translateY(80px);opacity:0;transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1);pointer-events:none;}
.toast.show{transform:translateY(0);opacity:1;}
.toast-icon{font-size:1.25rem;}
.toast-t{font-weight:700;color:var(--accent3);display:block;margin-bottom:1px;}
.toast-s{color:var(--muted);font-size:0.76rem;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--muted2);border-radius:2px;}
@media(max-width:1100px){}
@media(max-width:700px){}

/* PERSONALITY CARDS */
.pers-card{background:var(--card);border:2.5px solid var(--border);border-radius:18px;padding:1.25rem 1rem;cursor:pointer;transition:all 0.22s;text-align:center;}
.pers-card:hover{border-color:rgba(255,60,172,0.4);transform:translateY(-3px);box-shadow:0 12px 28px rgba(0,0,0,0.35);}
.pers-card.sel{border-color:var(--accent);background:rgba(255,60,172,0.08);box-shadow:0 0 0 3px rgba(255,60,172,0.2);}
.pers-emoji{font-size:2.2rem;margin-bottom:0.6rem;}
.pers-name{font-family:var(--font-h);font-size:0.9rem;font-weight:700;margin-bottom:0.5rem;color:var(--white);}
.pers-desc{font-size:0.72rem;color:var(--muted);line-height:1.55;}
/* VOICE CARDS */
.voice-card{background:var(--card);border:2.5px solid var(--border);border-radius:18px;padding:1.25rem 1rem;cursor:pointer;transition:all 0.22s;text-align:center;}
.voice-card:hover{border-color:rgba(120,76,254,0.4);transform:translateY(-3px);box-shadow:0 12px 28px rgba(0,0,0,0.35);}
.voice-card.sel{border-color:var(--accent2);background:rgba(120,76,254,0.1);box-shadow:0 0 0 3px rgba(120,76,254,0.2);}
.voice-emoji{font-size:2.2rem;margin-bottom:0.6rem;}
.voice-name{font-family:var(--font-h);font-size:0.9rem;font-weight:700;margin-bottom:0.5rem;color:var(--white);}
.voice-desc{font-size:0.72rem;color:var(--muted);line-height:1.55;}
/* OUTFIT CARDS */
.outfit-card{background:var(--card);border:2.5px solid var(--border);border-radius:16px;padding:1.1rem 0.85rem;cursor:pointer;transition:all 0.22s;text-align:center;}
.outfit-card:hover{border-color:rgba(0,245,212,0.4);transform:translateY(-3px);}
.outfit-card.sel{border-color:var(--accent3);background:rgba(0,245,212,0.08);box-shadow:0 0 0 3px rgba(0,245,212,0.15);}
.outfit-icon{font-size:1.8rem;margin-bottom:0.5rem;}
.outfit-name{font-size:0.76rem;font-weight:600;color:var(--white);line-height:1.3;}



/* Age Slider */
.age-slider-wrap{margin-top:1.75rem;}
.age-slider-label{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.85rem;}
.age-slider-title{font-size:0.7rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--accent);}
.age-display{font-family:var(--font-h);font-size:1.6rem;font-weight:800;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-0.02em;}
.age-display span{font-size:0.75rem;font-family:var(--font-b);font-weight:400;color:var(--muted);-webkit-text-fill-color:var(--muted);}
.age-slider-track{position:relative;padding:0.5rem 0;}
.age-range{width:100%;-webkit-appearance:none;appearance:none;height:5px;border-radius:3px;outline:none;cursor:pointer;background:linear-gradient(90deg,var(--accent2) 0%,var(--accent2) var(--age-pct,0%),rgba(255,255,255,0.1) var(--age-pct,0%));}
.age-range::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));box-shadow:0 0 0 4px rgba(120,76,254,0.2),0 4px 12px rgba(0,0,0,0.3);transition:box-shadow 0.2s;cursor:pointer;}
.age-range::-webkit-slider-thumb:hover{box-shadow:0 0 0 6px rgba(120,76,254,0.3),0 4px 12px rgba(0,0,0,0.3);}
.age-range::-moz-range-thumb{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;cursor:pointer;}
.age-ticks{display:flex;justify-content:space-between;margin-top:6px;}
.age-tick{font-size:0.68rem;color:var(--muted2);font-family:var(--font-h);font-weight:600;}
.age-tick.edge{color:var(--muted);}


</style>
<script src="api.js"></script>
</body>
</html>
