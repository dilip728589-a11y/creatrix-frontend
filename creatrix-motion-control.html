<!DOCTYPE html>
<html lang="en">
<head>
<script type="text/javascript">
(function(c,l,a,r,i,t,y){

t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
})(window, document, "clarity", "script", "wnqtcqu7ae");
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Motion Control — Creatrix AI</title>
<link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700;800&family=Cabinet+Grotesk:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#04040A;--bg2:#080812;--card:#0F0F1E;--card2:#161628;--white:#F0EEF8;--muted:#7070A0;--muted2:#3A3A5C;--accent:#FF3CAC;--accent2:#784CFE;--accent3:#00F5D4;--gold:#FFD166;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--font-h:'Clash Display',sans-serif;--font-b:'Cabinet Grotesk',sans-serif;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{background:var(--bg);color:var(--white);font-family:var(--font-b);overflow-x:hidden;}

/* TOPBAR */
.topbar{position:fixed;top:0;left:0;right:0;z-index:200;height:62px;background:rgba(4,4,10,0.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 2.5rem;}
.tb-left{display:flex;align-items:center;gap:1.25rem;}
.back-btn{color:var(--muted);font-size:0.85rem;font-weight:500;text-decoration:none;transition:color 0.2s;}
.back-btn:hover{color:var(--white);}
.tb-div{width:1px;height:18px;background:var(--border2);}
.tb-logo{font-family:var(--font-h);font-size:1.15rem;font-weight:700;text-decoration:none;color:var(--white);}
.tb-logo span{background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.credits-pill{display:flex;align-items:center;gap:7px;background:var(--card);border:1px solid var(--border2);border-radius:100px;padding:0.38rem 1rem;font-size:0.8rem;}
.credits-pill .cv{font-family:var(--font-h);font-weight:700;color:var(--accent3);}
.credits-pill .cl{color:var(--muted);}

/* TAB BAR */
.tab-bar{position:fixed;top:62px;left:0;right:0;z-index:100;background:rgba(4,4,10,0.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 2.5rem;overflow-x:auto;}
.tab{padding:0.9rem 1.4rem;font-size:0.85rem;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s;white-space:nowrap;text-decoration:none;display:flex;align-items:center;gap:7px;}
.tab:hover{color:var(--white);}
.tab.active{color:var(--white);border-bottom-color:var(--accent2);}

/* PAGE LAYOUT */
.page-wrap{padding-top:110px;min-height:100vh;display:grid;grid-template-columns:1fr;max-width:1300px;margin:0 auto;padding-left:2.5rem;padding-right:2.5rem;padding-bottom:4rem;}

/* LEFT */
.left-panel{padding-right:0;padding-top:2rem;max-width:780px;}
.section-title{font-family:var(--font-h);font-size:1.5rem;font-weight:800;letter-spacing:-0.02em;margin-bottom:0.35rem;}
.section-sub{color:var(--muted);font-size:0.88rem;margin-bottom:0.85rem;line-height:1.6;}

/* INFO BOX */
.info-box{background:rgba(120,76,254,0.07);border:1px solid rgba(120,76,254,0.2);border-radius:14px;padding:1rem 1.25rem;margin-bottom:2rem;}
.ib-title{font-size:0.75rem;font-weight:700;color:var(--accent2);margin-bottom:0.5rem;display:flex;align-items:center;gap:6px;}
.ib-list{list-style:none;display:flex;flex-direction:column;gap:4px;}
.ib-list li{font-size:0.75rem;color:var(--muted);display:flex;align-items:flex-start;gap:7px;line-height:1.5;}
.ib-list li::before{content:'•';color:var(--accent2);flex-shrink:0;margin-top:1px;}

/* FORM */
.form-group{margin-bottom:1.75rem;}
.form-label{font-size:0.7rem;font-weight:700;letter-spacing:0.11em;text-transform:uppercase;color:var(--muted);margin-bottom:0.85rem;display:flex;align-items:center;gap:8px;}
.form-label::after{content:'';flex:1;height:1px;background:var(--border);}
.req{font-size:0.68rem;color:var(--accent);font-weight:700;text-transform:none;letter-spacing:0;}

/* IMAGE UPLOAD - 2 slots */
.image-slots{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.img-slot{border:2px dashed var(--muted2);border-radius:18px;aspect-ratio:4/5;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.6rem;cursor:pointer;transition:all 0.25s;position:relative;overflow:hidden;background:var(--card);}
.img-slot:hover{border-color:var(--accent2);background:rgba(120,76,254,0.05);}
.img-slot.has-img{border-style:solid;border-color:var(--accent2);}
.img-slot.optional{border-color:var(--muted2);}
.slot-icon{font-size:1.75rem;transition:transform 0.2s;}
.img-slot:hover .slot-icon{transform:scale(1.1);}
.slot-label{font-family:var(--font-h);font-size:0.82rem;font-weight:700;color:var(--white);}
.slot-sub{font-size:0.68rem;color:var(--muted);text-align:center;line-height:1.4;padding:0 0.5rem;}
.slot-badge{position:absolute;top:8px;left:8px;font-size:0.6rem;font-weight:700;padding:2px 8px;border-radius:100px;backdrop-filter:blur(6px);}
.slot-badge.required{background:rgba(255,60,172,0.2);color:var(--accent);border:1px solid rgba(255,60,172,0.3);}
.slot-badge.optional{background:rgba(255,255,255,0.08);color:var(--muted);border:1px solid rgba(255,255,255,0.1);}
.slot-preview{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:top;display:block;}
.slot-overlay{position:absolute;inset:0;background:rgba(4,4,10,0.5);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.2s;}
.img-slot:hover .slot-overlay{opacity:1;}
.slot-change{font-size:0.75rem;font-weight:700;color:#fff;background:rgba(0,0,0,0.6);padding:5px 12px;border-radius:100px;}
.slot-remove{position:absolute;top:8px;right:8px;width:22px;height:22px;background:rgba(255,60,172,0.7);border-radius:50%;display:none;align-items:center;justify-content:center;font-size:0.6rem;color:#fff;cursor:pointer;z-index:2;}
.img-slot.has-img .slot-remove{display:flex;}
input[type=file]{display:none;}

/* MOTION AMOUNT SLIDER */
.motion-slider-wrap{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.25rem;}
.ms-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
.ms-title{font-size:0.85rem;font-weight:600;}
.ms-value{font-family:var(--font-h);font-size:1.1rem;font-weight:800;color:var(--accent3);}
input[type=range]{width:100%;height:5px;border-radius:3px;-webkit-appearance:none;appearance:none;outline:none;cursor:pointer;background:linear-gradient(90deg,var(--accent2) 0%,var(--accent2) var(--pct,50%),rgba(255,255,255,0.1) var(--pct,50%));}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--white);box-shadow:0 0 0 3px rgba(120,76,254,0.3);transition:box-shadow 0.2s;}
input[type=range]::-webkit-slider-thumb:hover{box-shadow:0 0 0 5px rgba(120,76,254,0.3);}
.ms-labels{display:flex;justify-content:space-between;margin-top:6px;}
.ms-lbl{font-size:0.68rem;color:var(--muted2);}
.ms-desc{font-size:0.75rem;color:var(--muted);margin-top:0.75rem;text-align:center;min-height:18px;transition:all 0.2s;}

/* MOTION TYPE CHIPS */
.chip-grid{display:flex;flex-wrap:wrap;gap:8px;}
.chip{padding:0.42rem 0.95rem;border-radius:100px;border:1.5px solid var(--border2);background:var(--card);color:var(--muted);font-size:0.8rem;font-weight:600;cursor:pointer;transition:all 0.18s;user-select:none;}
.chip:hover{border-color:rgba(255,255,255,0.2);color:var(--white);}
.chip.sel{background:rgba(120,76,254,0.15);border-color:var(--accent2);color:var(--white);}

/* MOTION PREVIEW CARDS */
.motion-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:0.85rem;}
.mc{background:var(--card);border:2px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;transition:all 0.2s;position:relative;}
.mc:hover{border-color:rgba(255,255,255,0.2);transform:translateY(-2px);}
.mc.sel{border-color:var(--accent2);background:rgba(120,76,254,0.08);}
.mc-thumb{aspect-ratio:1;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:1.75rem;position:relative;overflow:hidden;}
.mc-anim{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.2s;}
.mc:hover .mc-anim,.mc.sel .mc-anim{opacity:1;}
.mc-label{padding:7px 8px;font-size:0.72rem;font-weight:600;text-align:center;}
.mc-check{position:absolute;top:6px;right:6px;width:18px;height:18px;background:var(--accent2);border-radius:50%;display:none;align-items:center;justify-content:center;font-size:0.55rem;color:#fff;}
.mc.sel .mc-check{display:flex;}

/* CAMERA CONTROLS */
.camera-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0.75rem;}
.cam-btn{background:var(--card);border:1.5px solid var(--border2);border-radius:12px;padding:0.75rem 0.5rem;text-align:center;cursor:pointer;transition:all 0.18s;}
.cam-btn:hover{border-color:rgba(255,255,255,0.2);background:var(--card2);}
.cam-btn.sel{border-color:var(--accent2);background:rgba(120,76,254,0.1);}
.cam-icon{font-size:1.2rem;margin-bottom:4px;}
.cam-label{font-size:0.7rem;font-weight:600;color:var(--muted);}
.cam-btn.sel .cam-label{color:var(--white);}

/* DURATION */
.dur-grid{display:flex;gap:8px;}
.dur-chip{padding:0.45rem 1.1rem;border-radius:100px;border:1.5px solid var(--border2);background:var(--card);color:var(--muted);font-size:0.8rem;font-weight:600;cursor:pointer;transition:all 0.18s;}
.dur-chip:hover{border-color:rgba(255,255,255,0.2);color:var(--white);}
.dur-chip.sel{background:rgba(120,76,254,0.15);border-color:var(--accent2);color:var(--white);}

/* TOGGLE */
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:0.75rem 1rem;background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:0.6rem;}
.ti-name{font-size:0.85rem;font-weight:600;}
.ti-sub{font-size:0.7rem;color:var(--muted);margin-top:1px;}
.toggle{position:relative;width:40px;height:22px;flex-shrink:0;}
.toggle input{opacity:0;width:0;height:0;}
.tslider{position:absolute;inset:0;background:var(--muted2);border-radius:100px;cursor:pointer;transition:background 0.25s;}
.tslider::before{content:'';position:absolute;width:16px;height:16px;left:3px;top:3px;background:#fff;border-radius:50%;transition:transform 0.25s;}
.toggle input:checked+.tslider{background:linear-gradient(90deg,var(--accent2),var(--accent));}
.toggle input:checked+.tslider::before{transform:translateX(18px);}

/* RIGHT PANEL */
.right-panel{display:none !important;}

/* PREVIEW */
.preview-box{background:var(--card);border:1px solid var(--border);border-radius:20px;overflow:hidden;}
.preview-head{padding:1rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.ph-title{font-family:var(--font-h);font-size:0.88rem;font-weight:700;}
.ph-badge{font-size:0.65rem;font-weight:700;padding:2px 9px;border-radius:100px;background:rgba(0,245,212,0.12);color:var(--accent3);border:1px solid rgba(0,245,212,0.2);}

.preview-area{position:relative;aspect-ratio:4/5;background:var(--card2);display:flex;align-items:center;justify-content:center;overflow:hidden;max-height:380px;}
.pa-img{width:100%;height:100%;object-fit:cover;object-position:top;display:block;}
.pa-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(4,4,10,0.85),transparent 60%);}
.pa-empty{text-align:center;padding:2rem;}
.pa-empty-icon{font-size:2.5rem;opacity:0.2;margin-bottom:0.5rem;}
.pa-empty-text{font-size:0.78rem;color:var(--muted);font-family:var(--font-h);}

/* Motion arrows overlay */
.motion-arrows{position:absolute;inset:0;display:none;pointer-events:none;}
.motion-arrows.show{display:block;}
.arrow{position:absolute;font-size:1.5rem;animation:float 1.5s ease-in-out infinite;opacity:0.7;}
@keyframes float{0%,100%{transform:translate(0,0);opacity:0.4}50%{transform:translate(var(--dx,0px),var(--dy,-8px));opacity:1}}

/* SUMMARY */
.summary-box{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:1.15rem;}
.sb-title{font-size:0.66rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted2);margin-bottom:0.85rem;}
.sb-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.sb-item{background:var(--card2);border-radius:10px;padding:0.48rem 0.7rem;}
.sb-key{font-size:0.58rem;color:var(--muted2);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:1px;}
.sb-val{font-size:0.76rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* COST */
.cost-box{background:rgba(0,245,212,0.06);border:1px solid rgba(0,245,212,0.18);border-radius:12px;padding:0.85rem 1rem;display:flex;align-items:center;justify-content:space-between;}
.cb-left{font-size:0.78rem;color:var(--muted);}
.cb-left strong{font-family:var(--font-h);font-size:1.05rem;color:var(--accent3);}
.cb-right{font-size:0.7rem;color:var(--muted2);}

/* GEN BTN */
.gen-btn{width:100%;padding:1rem;border:none;border-radius:14px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-family:var(--font-h);font-weight:800;font-size:1rem;cursor:pointer;transition:opacity 0.2s,transform 0.15s;display:flex;align-items:center;justify-content:center;gap:10px;}
.gen-btn:hover{opacity:0.88;transform:translateY(-1px);}

/* RECENT */
.recent-section{margin-top:2.5rem;}
.rs-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.1rem;}
.rs-title{font-family:var(--font-h);font-size:1.05rem;font-weight:700;}
.recent-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:1rem;}
.rc{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;transition:transform 0.2s,box-shadow 0.2s;}
.rc:hover{transform:translateY(-3px);box-shadow:0 12px 30px rgba(0,0,0,0.4);}
.rc-thumb{position:relative;aspect-ratio:4/5;max-height:150px;overflow:hidden;}
.rc-thumb img{width:100%;height:100%;object-fit:cover;object-position:top;display:block;transition:transform 0.4s;}
.rc:hover .rc-thumb img{transform:scale(1.05);}
.rc-badge{position:absolute;top:6px;left:6px;background:rgba(120,76,254,0.8);font-size:0.58rem;font-weight:700;padding:2px 7px;border-radius:100px;backdrop-filter:blur(4px);}
.rc-dur{position:absolute;bottom:6px;right:6px;background:rgba(0,0,0,0.7);font-size:0.62rem;font-weight:700;padding:1px 6px;border-radius:100px;}
.rc-info{padding:0.65rem 0.8rem;}
.rc-name{font-size:0.78rem;font-weight:700;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rc-meta{font-size:0.65rem;color:var(--muted);}
.rc-actions{display:flex;gap:5px;margin-top:7px;}
.rc-btn{flex:1;padding:4px;background:var(--card2);border:1px solid var(--border2);border-radius:7px;color:var(--muted);font-size:0.62rem;font-weight:600;cursor:pointer;text-align:center;transition:all 0.15s;}
.rc-btn:hover{color:var(--white);}

/* LOADING */
.loading-overlay{position:fixed;inset:0;background:rgba(4,4,10,0.92);backdrop-filter:blur(12px);z-index:999;display:none;align-items:center;justify-content:center;flex-direction:column;gap:1.5rem;}
.loading-overlay.show{display:flex;}
.loading-ring{width:70px;height:70px;border:3px solid rgba(255,255,255,0.1);border-top-color:var(--accent2);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-title{font-family:var(--font-h);font-size:1.3rem;font-weight:700;}
.loading-sub{color:var(--muted);font-size:0.88rem;}
.loading-bar-wrap{width:280px;height:4px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden;}
.loading-bar{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent3));border-radius:2px;width:0%;animation:loadProg 5s ease forwards;}
@keyframes loadProg{0%{width:0%}70%{width:80%}95%{width:95%}100%{width:100%}}

::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--muted2);border-radius:2px;}
@media(max-width:1000px){.page-wrap{grid-template-columns:1fr;}.right-panel{border-left:none;border-top:1px solid var(--border);position:static;height:auto;padding-left:0;}}
@media(max-width:600px){.tab-bar{padding:0 1rem;}.tab{padding:0.75rem 0.85rem;font-size:0.78rem;}.image-slots{grid-template-columns:1fr 1fr;}}

.slot-formats{font-size:0.62rem;color:var(--muted2);text-align:center;background:var(--card2);padding:3px 8px;border-radius:100px;margin-top:2px;}

</style>
<script src="api.js"></script>
</body>
