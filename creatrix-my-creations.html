<!DOCTYPE html>
<html lang="en">
<head>
<script type="text/javascript">
(function(c,l,a,r,i,t,y){
c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
})(window, document, "clarity", "script", "wnqtcqu7ae");
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Creations — Creatrix AI</title>
<link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700;800&family=Cabinet+Grotesk:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#04040A;--bg2:#080812;--card:#0F0F1E;--card2:#161628;--white:#F0EEF8;--muted:#7070A0;--muted2:#3A3A5C;--accent:#FF3CAC;--accent2:#784CFE;--accent3:#00F5D4;--gold:#FFD166;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--font-h:'Clash Display',sans-serif;--font-b:'Cabinet Grotesk',sans-serif;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;}
body{background:var(--bg);color:var(--white);font-family:var(--font-b);}

/* TOPBAR */
.topbar{position:fixed;top:0;left:0;right:0;z-index:200;height:62px;background:rgba(4,4,10,0.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 2.5rem;}
.tb-left{display:flex;align-items:center;gap:1.25rem;}
.back-btn{color:var(--muted);font-size:0.85rem;font-weight:500;text-decoration:none;transition:color 0.2s;}
.back-btn:hover{color:var(--white);}
.tb-div{width:1px;height:18px;background:var(--border2);}
.tb-logo{font-family:var(--font-h);font-size:1.15rem;font-weight:700;text-decoration:none;color:var(--white);}
.tb-logo span{background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.tb-right{display:flex;align-items:center;gap:0.85rem;}
.credits-pill{display:flex;align-items:center;gap:7px;background:var(--card);border:1px solid var(--border2);border-radius:100px;padding:0.38rem 1rem;font-size:0.8rem;}
.credits-pill .cv{font-family:var(--font-h);font-weight:700;color:var(--accent3);}
.credits-pill .cl{color:var(--muted);}
.btn-create{display:flex;align-items:center;gap:7px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;text-decoration:none;font-family:var(--font-h);font-size:0.85rem;font-weight:700;padding:0.5rem 1.25rem;border-radius:100px;transition:opacity 0.2s;}
.btn-create:hover{opacity:0.88;}

/* PAGE */
.page{padding:62px 0 4rem;}
.page-header{padding:2.5rem 3rem 1.5rem;display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:1rem;}
.page-eyebrow{font-size:0.68rem;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--accent);margin-bottom:0.4rem;}
.page-title{font-family:var(--font-h);font-size:2.25rem;font-weight:800;letter-spacing:-0.03em;}
.page-count{font-size:0.85rem;color:var(--muted);margin-top:0.35rem;}

/* STATS ROW */
.stats-row{display:flex;gap:1rem;padding:0 3rem 1.75rem;flex-wrap:wrap;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1rem 1.5rem;display:flex;align-items:center;gap:1rem;flex:1;min-width:140px;}
.stat-icon{font-size:1.75rem;}
.stat-val{font-family:var(--font-h);font-size:1.5rem;font-weight:800;}
.stat-lbl{font-size:0.72rem;color:var(--muted);margin-top:1px;}

/* FILTER BAR */
.filter-bar{padding:0 3rem 1.75rem;display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap;}
.filter-chip{padding:0.45rem 1.1rem;border-radius:100px;border:1.5px solid var(--border2);background:var(--card);color:var(--muted);font-size:0.8rem;font-weight:600;cursor:pointer;transition:all 0.18s;user-select:none;display:flex;align-items:center;gap:5px;}
.filter-chip:hover{border-color:rgba(255,255,255,0.2);color:var(--white);}
.filter-chip.active{background:rgba(120,76,254,0.15);border-color:var(--accent2);color:var(--white);}
.filter-sep{width:1px;height:20px;background:var(--border2);margin:0 0.25rem;}
.sort-select{background:var(--card);border:1.5px solid var(--border2);color:var(--muted);font-size:0.8rem;font-weight:600;padding:0.45rem 1rem;border-radius:100px;cursor:pointer;outline:none;font-family:var(--font-b);}
.view-toggle{display:flex;background:var(--card);border:1px solid var(--border2);border-radius:100px;padding:3px;gap:2px;margin-left:auto;}
.vt-btn{padding:0.35rem 0.75rem;border-radius:100px;font-size:0.75rem;cursor:pointer;transition:all 0.18s;color:var(--muted);}
.vt-btn.active{background:var(--card2);color:var(--white);}
.search-wrap{position:relative;}
.search-input{background:var(--card);border:1.5px solid var(--border2);color:var(--white);font-size:0.82rem;padding:0.45rem 1rem 0.45rem 2.25rem;border-radius:100px;outline:none;font-family:var(--font-b);width:190px;transition:border-color 0.2s,width 0.3s;}
.search-input:focus{border-color:var(--accent2);width:240px;}
.search-input::placeholder{color:var(--muted2);}
.search-icon{position:absolute;left:0.75rem;top:50%;transform:translateY(-50%);color:var(--muted);font-size:0.8rem;pointer-events:none;}

/* GRID */
.grid-wrap{padding:0 3rem;}
.creations-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1.25rem;}
.creations-grid.list-view{grid-template-columns:1fr;}

/* CREATION CARD */
.creation-card{background:var(--card);border:1px solid var(--border);border-radius:20px;overflow:hidden;transition:transform 0.25s,box-shadow 0.25s,border-color 0.25s;cursor:pointer;}
.creation-card:hover{transform:translateY(-4px);box-shadow:0 18px 45px rgba(0,0,0,0.45);border-color:var(--border2);}

/* Thumbnail */
.cc-thumb{position:relative;overflow:hidden;}
.cc-thumb-img{width:100%;aspect-ratio:9/16;object-fit:cover;object-position:top;display:block;transition:transform 0.5s;}
.cc-thumb.landscape .cc-thumb-img{aspect-ratio:16/9;}
.cc-thumb.square .cc-thumb-img{aspect-ratio:1;}
.creation-card:hover .cc-thumb-img{transform:scale(1.05);}
.cc-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.4);opacity:0;transition:opacity 0.25s;display:flex;align-items:center;justify-content:center;gap:8px;}
.creation-card:hover .cc-overlay{opacity:1;}
.cc-action-btn{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.15);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-size:0.85rem;cursor:pointer;transition:background 0.18s;color:#fff;text-decoration:none;}
.cc-action-btn:hover{background:rgba(120,76,254,0.5);}
.cc-action-btn.del:hover{background:rgba(255,60,172,0.5);}

/* Badges */
.cc-type-badge{position:absolute;top:10px;left:10px;font-size:0.6rem;font-weight:700;padding:3px 8px;border-radius:100px;backdrop-filter:blur(6px);letter-spacing:0.04em;}
.badge-video{background:rgba(120,76,254,0.8);color:#fff;}
.badge-lipsync{background:rgba(255,60,172,0.8);color:#fff;}
.badge-motion{background:rgba(0,245,212,0.8);color:#000;}
.badge-ugc{background:rgba(255,209,102,0.85);color:#1a1000;}
.badge-image{background:rgba(59,130,246,0.8);color:#fff;}
.cc-dur{position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,0.7);font-size:0.62rem;font-weight:700;padding:2px 7px;border-radius:100px;font-family:var(--font-h);}
.cc-play{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,0.15);backdrop-filter:blur(8px);border:2px solid rgba(255,255,255,0.3);display:flex;align-items:center;justify-content:center;font-size:1rem;opacity:0;transition:opacity 0.25s;}
.creation-card:hover .cc-play{opacity:1;}

/* Card info */
.cc-info{padding:0.9rem 1rem;}
.cc-title{font-family:var(--font-h);font-size:0.88rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px;}
.cc-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:0.65rem;}
.cc-tag{font-size:0.62rem;padding:2px 7px;border-radius:100px;background:var(--card2);color:var(--muted);font-weight:600;}
.cc-footer{display:flex;align-items:center;justify-content:space-between;padding-top:0.65rem;border-top:1px solid var(--border);}
.cc-date{font-size:0.68rem;color:var(--muted2);}
.cc-btns{display:flex;gap:5px;}
.ccb{padding:4px 9px;background:var(--card2);border:1px solid var(--border2);border-radius:8px;color:var(--muted);font-size:0.65rem;font-weight:600;cursor:pointer;transition:all 0.15s;}
.ccb:hover{color:var(--white);border-color:rgba(255,255,255,0.2);}
.ccb.download{background:rgba(0,245,212,0.08);border-color:rgba(0,245,212,0.2);color:var(--accent3);}
.ccb.download:hover{background:rgba(0,245,212,0.15);}

/* LIST VIEW */
.creations-grid.list-view .creation-card{display:grid;grid-template-columns:120px 1fr;border-radius:16px;}
.creations-grid.list-view .cc-thumb{border-radius:16px 0 0 16px;}
.creations-grid.list-view .cc-thumb-img{aspect-ratio:1;height:120px;width:120px;}
.creations-grid.list-view .cc-thumb.landscape .cc-thumb-img{aspect-ratio:1;height:120px;}
.creations-grid.list-view .cc-info{display:flex;flex-direction:column;justify-content:center;padding:1rem 1.25rem;}

/* EMPTY STATE */
.empty-state{text-align:center;padding:5rem 2rem;display:none;}
.empty-state.show{display:block;}
.empty-icon{font-size:4rem;opacity:0.25;margin-bottom:1.25rem;}
.empty-title{font-family:var(--font-h);font-size:1.5rem;font-weight:700;margin-bottom:0.5rem;}
.empty-sub{color:var(--muted);font-size:0.9rem;margin-bottom:2rem;line-height:1.7;}
.empty-btn{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;text-decoration:none;font-family:var(--font-h);font-size:0.88rem;font-weight:700;padding:0.8rem 2rem;border-radius:12px;}

/* DELETE MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(4,4,10,0.88);backdrop-filter:blur(8px);z-index:500;display:none;align-items:center;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal{background:var(--card);border:1px solid var(--border2);border-radius:24px;padding:2rem;max-width:380px;width:90%;text-align:center;animation:popIn 0.25s ease both;}
@keyframes popIn{from{opacity:0;transform:scale(0.92)}to{opacity:1;transform:scale(1)}}
.modal-icon{font-size:2.5rem;margin-bottom:1rem;}
.modal-title{font-family:var(--font-h);font-size:1.2rem;font-weight:700;margin-bottom:0.5rem;}
.modal-sub{color:var(--muted);font-size:0.85rem;margin-bottom:1.75rem;line-height:1.65;}
.modal-btns{display:flex;gap:0.75rem;}
.modal-cancel{flex:1;padding:0.72rem;background:var(--card2);border:1px solid var(--border2);color:var(--muted);border-radius:12px;font-family:var(--font-b);font-size:0.88rem;font-weight:600;cursor:pointer;}
.modal-cancel:hover{color:var(--white);}
.modal-delete{flex:1;padding:0.72rem;background:linear-gradient(135deg,#ff3c3c,#c01c1c);border:none;color:#fff;border-radius:12px;font-family:var(--font-h);font-size:0.88rem;font-weight:700;cursor:pointer;transition:opacity 0.2s;}
.modal-delete:hover{opacity:0.88;}

/* TOAST */
.toast{position:fixed;bottom:2rem;right:2rem;z-index:999;background:var(--card2);border:1px solid var(--accent3);border-radius:14px;padding:0.9rem 1.1rem;display:flex;align-items:center;gap:10px;font-size:0.86rem;transform:translateY(80px);opacity:0;transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1);pointer-events:none;}
.toast.show{transform:translateY(0);opacity:1;}
.toast-icon{font-size:1.2rem;}
.toast-t{font-weight:700;color:var(--accent3);display:block;margin-bottom:1px;}
.toast-s{color:var(--muted);font-size:0.75rem;}

::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--muted2);border-radius:2px;}
@media(max-width:768px){.page-header,.filter-bar,.grid-wrap{padding-left:1.5rem;padding-right:1.5rem;}.stats-row{padding:0 1.5rem 1.5rem;}.creations-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));}}
</style>
<script src="api.js"></script>
</body>
</html>
